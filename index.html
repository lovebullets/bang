<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Main Lobby</title>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <style>
        /* === 기본 리셋 및 폰트 설정 === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* 드래그 방지 */
            -webkit-tap-highlight-color: transparent; /* 모바일 터치 시 파란 박스 제거 */
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", sans-serif;
            color: #ebebeb; 
        }

        /* === 반응형 배경화면 === */
        #app-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 0.5s ease-in-out;
            
            /* 기본(모바일) 라이트 모드 배경화면 */
            background-image: url('https://i.ibb.co/JwCS4GGV/image.png');
        }

        /* 나이트 모드 (모바일) 배경화면 */
        #app-container.night-mode {
            background-image: url('https://i.ibb.co/YF0wt9PM/IMG-5109.jpg');
        }

        /* === 텍스트 그림자 (가독성 보호) === */
        .text-shadow {
            text-shadow: 0px 2px 5px rgba(0, 0, 0, 0.85);
        }

        /* === 공통 글래스모피즘 & 애니메이션 효과 === */
        .glass-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.2); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: #ebebeb;
            text-decoration: none;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            /* 예쁜 애니메이션 트랜지션 추가 */
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* 마우스 오버 / 터치 시 빛나면서 살짝 떠오르는 효과 */
        .glass-btn:hover, .glass-btn:active {
            background: rgba(255, 255, 255, 0.35);
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 20px rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.8);
        }
        
        .glass-btn:active {
            transform: scale(0.95); /* 누를 때는 쫀득하게 들어감 */
        }

        /* ==========================================
           모바일 기본 레이아웃 (Mobile First) 
           전체적으로 크기 및 여백 최적화 
        ========================================== */

        /* 1. 상단 좌측 모드 전환 (FEARLESS / VILLAIN) */
        .top-left-profile {
            position: absolute;
            /* 모바일에서 천장에 안 붙도록 상단 여백 대폭 추가 (50px) */
            top: max(20px, env(safe-area-inset-top)); 
            left: 20px;
            display: flex;
            align-items: center;
            padding: 6px 18px;
            border-radius: 30px;
            z-index: 100;
        }
        .user-name {
            font-size: 14px; /* 글꼴 크기 축소 */
            font-weight: 800;
            letter-spacing: 1.5px;
        }

        /* 2. 좌측 메뉴 (메시지, 일정, 메모) */
        .left-menu {
            position: absolute;
            top: 110px; /* 프로필 아래에 위치 */
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 50;
        }
        .left-menu .glass-btn {
            width: 45px;
            height: 45px;
            border-radius: 14px;
            font-size: 22px; /* 아이콘 크기 축소 */
        }
        .left-menu span {
            font-size: 10px;
            font-weight: 600;
            margin-top: 4px;
            text-shadow: 0px 1px 3px rgba(0,0,0,0.8);
        }

        /* 3. 우측 메뉴 (보고서, OOC, AU, 19) */
        .right-menu {
            position: absolute;
            top: 50%;
            right: 20px;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 16px;
            z-index: 50;
        }
        .right-menu .menu-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            text-decoration: none;
            color: #ebebeb;
        }
        .right-menu .glass-btn {
            width: 45px;
            height: 45px;
            border-radius: 14px;
            font-size: 22px;
        }
        .right-menu span {
            font-size: 11px;
            font-weight: 600;
        }

        /* 4. 하단 네비게이션 (데이트, MAIN, 기억) */
        .bottom-nav {
            position: absolute;
            bottom: max(30px, env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: flex-end;
            gap: 25px;
            z-index: 100;
        }
        .bottom-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            color: #ebebeb;
        }
        .bottom-nav-item .glass-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%; /* 하단은 동그랗게 */
            font-size: 24px;
        }
        .bottom-nav-item span {
            font-size: 11px;
            font-weight: 700;
        }

        /* MAIN 표적 버튼 전용 (총/저격 컨셉 애니메이션) */
        @keyframes targetPulse {
            0% { box-shadow: 0 0 8px rgba(255, 60, 60, 0.4); border-color: rgba(255, 255, 255, 0.5); }
            50% { box-shadow: 0 0 20px rgba(255, 60, 60, 0.8); border-color: rgba(255, 60, 60, 0.8); }
            100% { box-shadow: 0 0 8px rgba(255, 60, 60, 0.4); border-color: rgba(255, 255, 255, 0.5); }
        }
        .bottom-nav-item.main-btn .glass-btn {
            width: 75px;
            height: 75px;
            font-size: 38px;
            background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, rgba(0,0,0,0.5) 100%);
            animation: targetPulse 2s infinite; /* 표적 숨쉬기 애니메이션 */
        }
        .bottom-nav-item.main-btn span {
            font-size: 13px;
            letter-spacing: 1px;
        }

        /* 5. 좌측 하단 핸드폰 (정상적인 폰 모양으로 복구) */
        .phone-icon-wrapper {
            position: absolute;
            bottom: max(30px, env(safe-area-inset-bottom));
            left: 20px;
            z-index: 100;
        }
        .phone-icon-wrapper a {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ebebeb;
            text-decoration: none;
            font-size: 38px; /* 모바일 맞춤 크기 축소 */
            filter: drop-shadow(0px 3px 6px rgba(0, 0, 0, 0.8));
            transition: all 0.3s ease;
        }
        .phone-icon-wrapper a:hover, .phone-icon-wrapper a:active {
            transform: scale(1.1) rotate(-5deg);
            filter: drop-shadow(0px 0px 10px rgba(255,255,255,0.5));
        }

        /* ==========================================
           PC 및 태블릿 레이아웃 (가로 너비 768px 이상)
           여백을 넓히고 아이콘/글씨 크기를 키움
        ========================================== */
        @media (min-width: 768px) {
            #app-container { background-image: url('https://i.ibb.co/XZ0wpvxv/IMG-2356.jpg'); } /* PC Light */
            #app-container.night-mode { background-image: url('https://i.ibb.co/1fRGCJgk/IMG-0765.jpg'); } /* PC Night */

            /* PC 버전 여백 최적화 */
            .top-left-profile { top: 40px; left: 40px; }
            .user-name { font-size: 16px; }

            .left-menu { top: 120px; left: 40px; gap: 20px; }
            .left-menu .glass-btn { width: 55px; height: 55px; font-size: 26px; }
            .left-menu span { font-size: 12px; }

            .right-menu { right: 40px; gap: 20px; }
            .right-menu .glass-btn { width: 55px; height: 55px; font-size: 26px; }
            .right-menu span { font-size: 12px; }

            .bottom-nav { bottom: 40px; gap: 40px; }
            .bottom-nav-item .glass-btn { width: 60px; height: 60px; font-size: 28px; }
            .bottom-nav-item span { font-size: 13px; }
            
            .bottom-nav-item.main-btn .glass-btn { width: 90px; height: 90px; font-size: 46px; }
            .bottom-nav-item.main-btn span { font-size: 15px; }

            .phone-icon-wrapper { bottom: 40px; left: 40px; }
            .phone-icon-wrapper a { font-size: 46px; }
        }
    </style>
</head>
<body>

<div id="app-container">

    <div class="top-left-profile glass-btn" id="mode-toggle-btn">
        <div class="user-name text-shadow" id="mode-text">FEARLESS</div>
    </div>

    <div class="left-menu">
        <a href="#" class="menu-item" style="text-decoration:none; color:inherit; display:flex; flex-direction:column; align-items:center;">
            <div class="glass-btn"><iconify-icon icon="solar:chat-round-line-linear"></iconify-icon></div>
            <span class="text-shadow">메시지</span>
        </a>
        <a href="#" class="menu-item" style="text-decoration:none; color:inherit; display:flex; flex-direction:column; align-items:center;">
            <div class="glass-btn"><iconify-icon icon="solar:calendar-linear"></iconify-icon></div>
            <span class="text-shadow">일정</span>
        </a>
        <a href="#" class="menu-item" style="text-decoration:none; color:inherit; display:flex; flex-direction:column; align-items:center;">
            <div class="glass-btn"><iconify-icon icon="solar:document-text-linear"></iconify-icon></div>
            <span class="text-shadow">메모</span>
        </a>
    </div>

    <div class="right-menu">
        <a href="#" class="menu-item">
            <div class="glass-btn"><iconify-icon icon="solar:clipboard-list-linear"></iconify-icon></div>
            <span class="text-shadow">보고서</span>
        </a>
        <a href="#" class="menu-item">
            <div class="glass-btn"><iconify-icon icon="solar:ghost-linear"></iconify-icon></div>
            <span class="text-shadow">OOC</span>
        </a>
        <a href="#" class="menu-item">
            <div class="glass-btn"><iconify-icon icon="solar:planet-3-linear"></iconify-icon></div>
            <span class="text-shadow">AU</span>
        </a>
        <a href="#" class="menu-item">
            <div class="glass-btn"><iconify-icon icon="solar:danger-triangle-linear"></iconify-icon></div>
            <span class="text-shadow">19</span>
        </a>
    </div>

    <div class="bottom-nav">
        <a href="#" class="bottom-nav-item">
            <div class="glass-btn"><iconify-icon icon="solar:cup-hot-linear"></iconify-icon></div>
            <span class="text-shadow">데이트</span>
        </a>
        
        <a href="#" class="bottom-nav-item main-btn">
            <div class="glass-btn"><iconify-icon icon="solar:target-linear"></iconify-icon></div>
            <span class="text-shadow">MAIN</span>
        </a>

        <a href="#" class="bottom-nav-item">
            <div class="glass-btn"><iconify-icon icon="solar:gallery-linear"></iconify-icon></div>
            <span class="text-shadow">기억</span>
        </a>
    </div>

    <div class="phone-icon-wrapper">
        <a href="phone/">
            <iconify-icon icon="solar:smartphone-linear"></iconify-icon>
        </a>
    </div>

</div>

<script>
    // FEARLESS <-> VILLAIN 모드 토글 로직
    const appContainer = document.getElementById('app-container');
    const modeToggleBtn = document.getElementById('mode-toggle-btn');
    const modeText = document.getElementById('mode-text');

    modeToggleBtn.addEventListener('click', () => {
        appContainer.classList.toggle('night-mode');
        
        if (appContainer.classList.contains('night-mode')) {
            modeText.textContent = 'VILLAIN';
        } else {
            modeText.textContent = 'FEARLESS';
        }
    });
</script>

</body>
</html>
