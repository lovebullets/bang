<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Main Lobby</title>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <style>
        /* === 기본 리셋 및 폰트 설정 === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100dvh; /* 모바일 하단바 씹힘 차단 */
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", sans-serif;
            color: #ebebeb; 
        }

        /* === 반응형 배경화면 === */
        #app-container {
            position: relative;
            width: 100vw;
            height: 100dvh;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 0.5s ease-in-out;
            
            /* 기본(모바일) 라이트 모드 배경화면 */
            background-image: url('https://i.ibb.co/m5b4c6CN/IMG-3898.jpg');
        }

        /* 나이트 모드 배경화면 */
        #app-container.night-mode {
            background-image: url('https://i.ibb.co/VW7qX7nz/IMG-2636.jpg');
        }

        /* === 텍스트 그림자 === */
        .text-shadow {
            text-shadow: 0px 2px 5px rgba(0, 0, 0, 0.85);
        }

        /* === 공통 메뉴 아이템 래퍼 === */
        .menu-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            text-decoration: none;
            color: #ebebeb;
        }

        /* === 공통 글래스모피즘 & 애니메이션 효과 === */
        .glass-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.2); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: #ebebeb;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .glass-btn:hover, .menu-item:active .glass-btn {
            background: rgba(255, 255, 255, 0.35);
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 20px rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.8);
        }
        
        .menu-item:active .glass-btn {
            transform: scale(0.95);
        }

        /* ==========================================
           모바일 기본 레이아웃
        ========================================== */

        /* 1. 상단 좌측 모드 전환 (FEARLESS / VILLAIN) */
        .top-left-profile {
            position: absolute;
            top: max(20px, env(safe-area-inset-top)); 
            left: 20px;
            display: flex;
            align-items: center;
            padding: 6px 16px;
            border-radius: 30px;
            z-index: 100;
            cursor: pointer;
        }
        .user-name {
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 1.5px;
        }

        /* 2. 좌측 메뉴 (핸드폰, 메시지, 일정, 메모) - 프로필 우측 이동으로 간결해짐 */
        .left-menu {
            position: absolute;
            top: 75px; 
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px; 
            z-index: 50;
        }
        
        /* 3. 우측 메뉴 (프로필, 보고서, OOC, AU, 19) */
        .right-menu {
            position: absolute;
            /* 정중앙(top:50%) 대신 하단 네비게이션 바로 위로 내려서 공백 축소 */
            bottom: 110px; 
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px; 
            z-index: 50;
        }

        /* 좌/우측 메뉴 버튼 공통 (네모 테두리 & 사이즈 축소) */
        .left-menu .glass-btn, .right-menu .glass-btn {
            width: 38px;  
            height: 38px;
            border-radius: 12px; /* 네모 테두리(Squircle) */
            font-size: 20px;
        }
        .left-menu span, .right-menu span {
            font-size: 10px;
            font-weight: 600;
        }

        /* 4. 하단 네비게이션 (데이트, MAIN, 기억) */
        .bottom-nav {
            position: absolute;
            bottom: max(30px, env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: flex-end;
            gap: 20px;
            z-index: 100;
        }
        .bottom-nav-item .glass-btn {
            width: 45px; 
            height: 45px;
            border-radius: 50%; /* 하단은 동그랗게 유지 */
            font-size: 22px;
        }
        .bottom-nav-item span {
            font-size: 11px;
            font-weight: 700;
            margin-top: 5px;
        }

        /* MAIN 표적 버튼 전용 (총/저격 컨셉 애니메이션) */
        @keyframes targetPulse {
            0% { box-shadow: 0 0 8px rgba(255, 60, 60, 0.4); border-color: rgba(255, 255, 255, 0.5); }
            50% { box-shadow: 0 0 20px rgba(255, 60, 60, 0.8); border-color: rgba(255, 60, 60, 0.8); }
            100% { box-shadow: 0 0 8px rgba(255, 60, 60, 0.4); border-color: rgba(255, 255, 255, 0.5); }
        }
        .bottom-nav-item.main-btn .glass-btn {
            width: 65px; 
            height: 65px;
            font-size: 34px;
            background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, rgba(0,0,0,0.5) 100%);
            animation: targetPulse 2s infinite; 
        }
        .bottom-nav-item.main-btn span {
            font-size: 12px;
            letter-spacing: 1px;
        }


        /* ==========================================
           PC 및 태블릿 레이아웃 (가로 너비 768px 이상)
        ========================================== */
        @media (min-width: 768px) {
            #app-container { background-image: url('https://i.ibb.co/XZ0wpvxv/IMG-2356.jpg'); } 
            #app-container.night-mode { background-image: url('https://i.ibb.co/1fRGCJgk/IMG-0765.jpg'); } 

            .top-left-profile { top: 40px; left: 40px; padding: 8px 24px; }
            .user-name { font-size: 16px; }

            .left-menu { top: 110px; left: 40px; gap: 16px; }
            .right-menu { bottom: 130px; right: 40px; gap: 16px; } /* PC에서도 공백 축소 */

            .left-menu .glass-btn, .right-menu .glass-btn { 
                width: 50px; 
                height: 50px; 
                font-size: 26px; 
                border-radius: 14px;
            }
            .left-menu span, .right-menu span { font-size: 12px; }

            .bottom-nav { bottom: 40px; gap: 40px; }
            .bottom-nav-item .glass-btn { width: 60px; height: 60px; font-size: 28px; }
            .bottom-nav-item span { font-size: 13px; }
            
            .bottom-nav-item.main-btn .glass-btn { width: 85px; height: 85px; font-size: 42px; }
            .bottom-nav-item.main-btn span { font-size: 14px; }
        }
    </style>
</head>
<body>

<div id="app-container">

    <div class="top-left-profile glass-btn" id="mode-toggle-btn">
        <div class="user-name text-shadow" id="mode-text">FEARLESS</div>
    </div>

    <div class="left-menu">
        <a href="phone/" class="menu-item">
            <div class="glass-btn"><iconify-icon icon="solar:smartphone-linear"></iconify-icon></div>
            <span class="text-shadow">핸드폰</span>
        </a>
        <a href="#" class="menu-item">
            <div class="glass-btn"><iconify-icon icon="solar:chat-round-text-linear"></iconify-icon></div>
            <span class="text-shadow">메시지</span>
        </a>
        <a href="#" class="menu-item">
            <div class="glass-btn"><iconify-icon icon="solar:calendar-linear"></iconify-icon></div>
            <span class="text-shadow">일정</span>
        </a>
        <a href="#" class="menu-item">
            <div class="glass-btn"><iconify-icon icon="solar:document-text-linear"></iconify-icon></div>
            <span class="text-shadow">메모</span>
        </a>
    </div>

    <div class="right-menu">
        <a href="#" class="menu-item">
            <div class="glass-btn"><iconify-icon icon="solar:shield-network-linear"></iconify-icon></div>
            <span class="text-shadow">프로필</span>
        </a>
        <a href="#" class="menu-item">
            <div class="glass-btn"><iconify-icon icon="solar:clipboard-list-linear"></iconify-icon></div>
            <span class="text-shadow">보고서</span>
        </a>
        <a href="#" class="menu-item">
            <div class="glass-btn"><iconify-icon icon="solar:clapperboard-play-linear"></iconify-icon></div>
            <span class="text-shadow">OOC</span>
        </a>
        <a href="#" class="menu-item">
            <div class="glass-btn"><iconify-icon icon="solar:infinity-linear"></iconify-icon></div>
            <span class="text-shadow">AU</span>
        </a>
        <a href="#" class="menu-item">
            <div class="glass-btn"><iconify-icon icon="solar:danger-triangle-linear"></iconify-icon></div>
            <span class="text-shadow">19</span>
        </a>
    </div>

    <div class="bottom-nav">
        <a href="#" class="menu-item bottom-nav-item">
            <div class="glass-btn"><iconify-icon icon="solar:heart-linear"></iconify-icon></div>
            <span class="text-shadow">데이트</span>
        </a>
        
        <a href="#" class="menu-item bottom-nav-item main-btn">
            <div class="glass-btn"><iconify-icon icon="solar:target-linear"></iconify-icon></div>
            <span class="text-shadow">MAIN</span>
        </a>

        <a href="memory/" class="menu-item bottom-nav-item">
            <div class="glass-btn"><iconify-icon icon="solar:camera-linear"></iconify-icon></div>
            <span class="text-shadow">기억</span>
        </a>
    </div>

</div>

<script>
    // FEARLESS <-> VILLAIN 모드 토글 로직
    const appContainer = document.getElementById('app-container');
    const modeToggleBtn = document.getElementById('mode-toggle-btn');
    const modeText = document.getElementById('mode-text');

    modeToggleBtn.addEventListener('click', () => {
        appContainer.classList.toggle('night-mode');
        
        if (appContainer.classList.contains('night-mode')) {
            modeText.textContent = 'VILLAIN';
        } else {
            modeText.textContent = 'FEARLESS';
        }
    });
</script>

</body>
</html>
