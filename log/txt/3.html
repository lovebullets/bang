<iframe id="bgmPlayerFrame" src="https://loading-lovebullets.naru.pub/editor/bgm.html" style="position: fixed; bottom: 20px; right: 20px; width: 32px; height: 32px; border: none; z-index: 9999; background: transparent; transition: 0.3s;" allow="autoplay"></iframe>

<script>
if(!window.bgmEventAdded){
    window.addEventListener('message', function(e) { 
        var frame = document.getElementById('bgmPlayerFrame'); 
        if (!frame) return; 
        if (e.data.action === 'minimize') { frame.style.width = '32px'; frame.style.height = '32px'; } 
        else if (e.data.action === 'expand') { frame.style.width = '240px'; frame.style.height = '140px'; } 
    }); 
    window.bgmEventAdded = true;
}

window.playBGM = function(videoId, title) { 
    var frame = document.getElementById('bgmPlayerFrame'); 
    if (frame) { frame.contentWindow.postMessage({ action: 'playBGM', videoId: videoId, title: title }, '*'); } 
}; 

window.stopBGM = function() { 
    var frame = document.getElementById('bgmPlayerFrame'); 
    if (frame) { frame.src = frame.src; } 
}; 

setTimeout(function() { 
    let visibleBoxes = new Set();
    let isProcessing = false;

    const observer = new IntersectionObserver(function(entries) { 
        entries.forEach(function(entry) { 
            if (entry.isIntersecting) {
                if (!entry.target.classList.contains('is-visible')) {
                    visibleBoxes.add(entry.target);
                }
            } else {
                visibleBoxes.delete(entry.target);
            }
        }); 
        
        if (!isProcessing && visibleBoxes.size > 0) {
            processNext();
        }
    }, { threshold: 0.05 }); 

    function processNext() {
        if (visibleBoxes.size === 0) {
            isProcessing = false;
            return;
        }
        isProcessing = true;

        let boxesArray = Array.from(visibleBoxes);
        boxesArray.sort(function(a, b) {
            return a.getBoundingClientRect().top - b.getBoundingClientRect().top;
        });

        let target = boxesArray[0];
        visibleBoxes.delete(target); 

        let prev = target.previousElementSibling;
        let isPrevDialog = false;
        while (prev) {
            if (prev.classList && prev.classList.contains('scroll-msg-box')) {
                isPrevDialog = true;
                break;
            } else if (prev.getAttribute && prev.getAttribute('data-type')) {
                isPrevDialog = false;
                break;
            } else if (prev.tagName === 'P') {
                isPrevDialog = false;
                break;
            }
            prev = prev.previousElementSibling;
        }

        let delay = isPrevDialog ? 100 : 400;

        setTimeout(function() {
            target.classList.add('is-visible');
            
            setTimeout(function() {
                processNext();
            }, 1300);
            
        }, delay);
    }

    const msgBoxes = document.querySelectorAll('.scroll-msg-box'); 
    msgBoxes.forEach(function(box) { observer.observe(box); }); 
}, 100);
</script>
