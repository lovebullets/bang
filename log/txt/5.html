<!DOCTYPE html>
<html lang="ko">

<head>
    <title>본문 보기</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1, minimum-scale=1.0, maximum-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge, chrome=1" />
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/earlyaccess/jejumyeongjo.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300&display=swap" />
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.3.1/jquery.js"></script>
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/xeicon@2.3.3/xeicon.min.css">
    
    <style>
        /* 기존 index.html과 디자인이 100% 동일하게 유지되는 CSS */
        .theme-light {
            --back-color: #fff; --main-color: #353535; --title-color: #1d1d1d; --sub-color: #c1c1c1;
            --link-color: #c1c1c1; --link-color-hover: #a2a2a2; --menu-color: #c1c1c1; --menu-color-hover: #a2a2a2; --divider-bg: #0000000d;
        }
        .theme-dark {
            --back-color: #292929; --main-color: #dadada; --title-color: #fbfbfb; --sub-color: #747474;
            --link-color: #747474; --link-color-hover: #a5a5a5; --menu-color: #747474; --menu-color-hover: #a5a5a5; --divider-bg: #ffffff0d;
        }
        * { font-family: 'Jeju Myeongjo', serif; box-sizing: border-box; }
        ::selection { color: var(--back-color); background-color: var(--main-color); }
        body { background-color: var(--back-color); transition: background-color 0.4s ease; color: var(--main-color); margin: 0; padding: 0; line-height: 180%; font-size: 14px; }
        button, input, select, table, textarea, p, div, a, span { margin: 0; padding: 0; line-height: 180%; font-size: inherit; color: inherit; font-family: inherit; }
        button, input { border: 0; border-radius: 0; }
        ol, ul { list-style: none; }
        a { color: var(--link-color); font-weight: normal; text-decoration: none; transition: color 0.2s ease; }
        a:hover { text-decoration: none; color: var(--link-color-hover); }
        html, body, #wrap { position: relative; height: 100%; }
        #container { position: absolute; width: 100%; top: 0; z-index: 1; left: 0; }
        #header { position: sticky; top: 0; z-index: 999; }
        .inner_header { max-width: fit-content; padding: 10px 20px 10px 0px; text-align: right; height: 30px; right: 0px; position: absolute; }
        .inner_header > button { background-color: transparent; float: right; position: absolute; right: 40px; cursor: pointer; font-size: 16px; color: var(--menu-color); }
        .inner_header > button:hover { color: var(--menu-color-hover); }
        .dropdown { display: inline-block; }
        .dropdown-bars { cursor: pointer; font-size: 16px; color: var(--menu-color); }
        .dropdown-bars:hover { color: var(--menu-color-hover); }
        .dropdown-inner { text-shadow: var(--back-color) 1px -1px 0px, var(--back-color) 1px 1px 0px, var(--back-color) -1px -1px 0px, var(--back-color) -1px 0px 0px, var(--back-color) 0px -1px 0px, var(--back-color) 0px 1px 0px, var(--back-color) 1px 0px 0px, var(--back-color) -1px 1px 0px; background: var(--back-color); padding: 10px; border: 1px solid var(--divider-bg); border-radius: 2px; margin-top: 5px; text-align: left; }
        .dropdown-inner a { display: block; color: var(--menu-color); cursor: pointer; padding: 6px 0; font-size: 12px; }
        .dropdown-inner a:hover { color: var(--menu-color-hover); }
        .inner_index { position: relative; max-width: 725px; margin: 80px auto; overflow: hidden; }
        .area_view_content { padding: 0 20px; max-height: auto !important; position: relative; }
        .btn-back-icon-wrap { text-align: right; margin-bottom: 15px; }
        .btn-back-icon { display: inline-block; color: var(--sub-color); font-size: 16px; opacity: 0.6; transition: opacity 0.2s; }
        .btn-back-icon:hover { opacity: 1; color: var(--title-color); }
        .article_content .title_view { font-size: 18px; color: var(--title-color); line-height: 120%; font-weight: bold; margin-bottom: 10px; letter-spacing: normal; }
        .area_view_content .article_content .info_post { display: block !important; margin: 0px 0px 30px 0px; padding-top: 0; }
        .area_view_content .article_content .view_info_post { color: var(--sub-color); line-height: 120%; font-size: 12px; text-align: right; }
        .area_view_content .article_view { overflow-x: hidden; font-size: 14px; }
    </style>
</head>

<body>
    <div id="wrap">
        <div id="container">
            
            <header id="header">
                <div class="inner_header">
                    <button onclick="toggleTheme()" title="테마 변경">
                        <i id="theme-icon" class="xi-toggle-off"></i>
                    </button>
                    <div class="dropdown">
                        <div class="dropdown-bars" title="메뉴 열기">
                            <i id="menu-icon" class="xi-bars"></i>
                        </div>
                        <div class="dropdown-inner">
                            <a href="../index.html#home"><i class="xi-home"></i> home</a>
                            <a href="../index.html#notice"><i class="xi-bell"></i> notice</a>
                            <a href="../index.html#list"><i class="xi-list"></i> list</a>
                        </div>
                    </div>
                </div>
            </header>

            <main id="main">
                <div class="inner_index">
                    <div id="view-article" class="page-view" style="display: block;">
                        <div class="area_view_content">
                            
                            <div class="btn-back-icon-wrap">
                                <a href="../index.html#list" class="btn-back-icon" title="목록으로 돌아가기">
                                    <i class="xi-close"></i>
                                </a>
                            </div>
                            
                            <div class="article_content">
                                <div class="info_post">
                                    <div class="title_view">여기에 글 제목을 적으세요</div>
                                    <div class="view_info_post">2026. 06. 14 · 일상</div>
                                </div>

                                <div class="article_view">
                                    
                                    </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        $(document).ready(function () {
            $(".dropdown-inner").hide();
            $(".dropdown-bars").click(function (e) {
                e.stopPropagation();
                $(".dropdown-inner").slideToggle(200); 
                let icon = $("#menu-icon");
                icon.toggleClass("xi-bars xi-close");
            });
            $(document).click(function() {
                $(".dropdown-inner").slideUp(200);
                $("#menu-icon").removeClass("xi-close").addClass("xi-bars");
            });
        });

        function setTheme(themeName) {
            localStorage.setItem('theme', themeName);
            document.documentElement.className = themeName;
            if(themeName === 'theme-dark') {
                $('#theme-icon').removeClass('xi-toggle-off').addClass('xi-toggle-on');
            } else {
                $('#theme-icon').removeClass('xi-toggle-on').addClass('xi-toggle-off');
            }
        }

        function toggleTheme() {
            setTheme(localStorage.getItem('theme') === 'theme-dark' ? 'theme-light' : 'theme-dark');
        }

        (function () {
            setTheme(localStorage.getItem('theme') === 'theme-dark' ? 'theme-dark' : 'theme-light');
        })();
    </script>
</body>
</html>
