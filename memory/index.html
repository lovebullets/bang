<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memory Archive</title>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            width: 100%;
            height: 100dvh;
            background-color: #0f1115; /* 어두운 밤 컨셉 배경 */
            background-image: radial-gradient(circle at 50% 0%, #2a3342 0%, #0f1115 70%);
            font-family: -apple-system, BlinkMacSystemFont, "Pretendard", sans-serif;
            color: #ebebeb;
            overflow-x: hidden;
        }

        /* === 상단 헤더 (뒤로가기 & 타이틀) === */
        header {
            position: sticky;
            top: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: max(20px, env(safe-area-inset-top)) 20px 20px 20px;
            background: rgba(15, 17, 21, 0.85);
            backdrop-filter: blur(15px);
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .back-btn {
            position: absolute;
            left: 20px;
            color: #ebebeb;
            text-decoration: none;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }
        .back-btn:active { transform: scale(0.9); }
        h1 { font-size: 18px; font-weight: 700; letter-spacing: 2px; }

        /* === 메모리 그리드 레이아웃 === */
        #memory-grid {
            display: grid;
            /* 모바일은 2열, PC는 남는 공간만큼 다중 열 */
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            padding: 20px;
            padding-bottom: max(40px, env(safe-area-inset-bottom));
        }

        /* === 개별 메모리 카드 디자인 === */
        .card {
            position: relative;
            width: 100%;
            aspect-ratio: 3 / 4; /* 오토메게임 특유의 세로 긴 카드 비율 */
            border-radius: 12px;
            overflow: hidden;
            text-decoration: none;
            display: block;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .card:hover, .card:active {
            transform: translateY(-5px) scale(1.02);
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 12px 25px rgba(255, 255, 255, 0.15);
        }

        /* 1. 이미지가 있는 경우의 배경 */
        .card-bg-img {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        /* 2. 이미지가 없는 경우의 대체 디자인 (고급스러운 유리 질감) */
        .card-no-img {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #2b3240 0%, #151820 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }
        .card-no-img iconify-icon {
            font-size: 60px;
            color: rgba(255, 255, 255, 0.1); /* 배경에 은은하게 박힌 아이콘 */
        }

        /* === 카드 하단 그라데이션 및 정보 영역 === */
        .card-info {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            padding: 40px 12px 12px 12px;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.6) 50%, transparent 100%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .card-title {
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            /* 텍스트가 길면 말줄임표 처리 */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-date {
            color: #aaa;
            font-size: 10px;
            font-weight: 500;
        }

        /* === 카드 등급 (SSR, SR 배지) === */
        .badge {
            position: absolute;
            top: 10px; left: 10px;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 1px;
            z-index: 10;
            box-shadow: 0 2px 6px rgba(0,0,0,0.5);
        }
        .badge.ssr { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%); color: #d6336c; }
        .badge.sr  { background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%); color: #1c7ed6; }
        .badge.r   { background: linear-gradient(135deg, #e2e2e2 0%, #c9d6ff 100%); color: #495057; }

        @media (min-width: 768px) {
            #memory-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 25px; padding: 40px; }
            .card-title { font-size: 16px; }
            .card-date { font-size: 12px; }
            .badge { font-size: 12px; padding: 4px 10px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="../" class="back-btn"><iconify-icon icon="solar:alt-arrow-left-linear"></iconify-icon></a>
        <h1>기억의 파편</h1>
    </header>

    <div id="memory-grid">
        </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const memoryGrid = document.getElementById('memory-grid');

            // list.html 데이터를 불러와서 파싱
            fetch('list.html')
                .then(response => response.text())
                .then(html => {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');
                    const items = doc.querySelectorAll('.memory-data');

                    items.forEach(item => {
                        const id = item.getAttribute('data-id');
                        const imgUrl = item.getAttribute('data-img');
                        const grade = item.getAttribute('data-grade');
                        const date = item.getAttribute('data-date');
                        const title = item.textContent.trim();

                        // 다이얼로그 폴더로 연결되는 링크 생성
                        const cardLink = document.createElement('a');
                        cardLink.href = `dialog/${id}.html`;
                        cardLink.className = 'card';

                        // 이미지 유무에 따른 배경 처리 분기점
                        let backgroundHtml = '';
                        if (imgUrl && imgUrl !== "") {
                            backgroundHtml = `<img src="${imgUrl}" class="card-bg-img" alt="${title}">`;
                        } else {
                            // 이미지가 없을 땐 FEARLESS 로고나 자물쇠 아이콘 같은 걸 은은하게 띄움
                            backgroundHtml = `
                                <div class="card-no-img">
                                    <iconify-icon icon="solar:lock-password-unlocked-linear"></iconify-icon>
                                </div>
                            `;
                        }

                        // 내부 HTML 조립 (등급은 소문자로 변환해 CSS 클래스와 매칭)
                        cardLink.innerHTML = `
                            ${backgroundHtml}
                            <div class="badge ${grade ? grade.toLowerCase() : 'r'}">${grade || 'R'}</div>
                            <div class="card-info">
                                <div class="card-title">${title}</div>
                                <div class="card-date">${date}</div>
                            </div>
                        `;

                        memoryGrid.appendChild(cardLink);
                    });
                })
                .catch(error => {
                    console.error('기억 리스트를 불러오지 못했습니다:', error);
                    memoryGrid.innerHTML = '<p style="text-align:center; padding: 20px; color:#aaa;">데이터를 불러올 수 없습니다.</p>';
                });
        });
    </script>

</body>
</html>
