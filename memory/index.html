<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memory Archive</title>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <style>
        /* === 기본 리셋 및 부드러운 페이드인 효과 === */
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            width: 100%;
            height: 100dvh;
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", sans-serif;
            color: #333333; /* 가독성을 위한 고급스러운 다크 그레이 텍스트 */
            overflow: hidden;
            background-color: #f7f8fa;
        }

        /* 글로벌 화면 전환 페이드인 애니메이션 */
        @keyframes pageFadeIn {
            from { opacity: 0; transform: scale(1.02); }
            to { opacity: 1; transform: scale(1); }
        }
        
        /* === 전체를 감싸는 반응형 블러 배경 === */
        #archive-container {
            position: relative;
            width: 100vw;
            height: 100dvh;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            animation: pageFadeIn 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            
            /* 수동 백업용 원본 이미지 배치 후 가공 */
            background-image: url('https://i.ibb.co/jkkjfz16/c6f62fdc-5a82-4c99-9e3f-e07d6e8561bf.png');
        }
        @media (min-width: 768px) {
            #archive-container {
                background-image: url('https://i.ibb.co/M5j3LxKJ/IMG-2051.jpg');
            }
        }
        /* 메인처럼 은은하고 맑은 화이트 블러 필터 적용 */
        #archive-container::before {
            content: ''; position: absolute; top:0; left:0; width:100%; height:100%;
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(25px) brightness(1.05);
            z-index: 1;
        }

        /* 레이아웃 내용물들을 블러 장막 위로 올림 */
        .content-layer {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        /* === 상단 헤더 UI (뒤로가기 & 3단 카테고리 탭) === */
        header {
            width: 100%;
            padding: max(15px, env(safe-area-inset-top)) 20px 10px 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .header-top {
            display: flex;
            align-items: center;
            position: relative;
            height: 40px;
        }
        .back-btn {
            position: absolute;
            left: 0;
            color: #444;
            text-decoration: none;
            font-size: 26px;
            display: flex;
            align-items: center;
            transition: all 0.2s;
        }
        .back-btn:active { transform: scale(0.9) translateX(-3px); }
        
        /* 5번 항목: 데일리, 이벤트, AU 3단 탭 메뉴 */
        .tab-menu {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            width: 100%;
        }
        .tab-item {
            font-size: 15px;
            font-weight: 700;
            color: #888888;
            cursor: pointer;
            padding-bottom: 6px;
            position: relative;
            letter-spacing: 1px;
            transition: color 0.3s ease;
        }
        .tab-item.active {
            color: #111111;
        }
        /* 선택된 탭 밑줄 애니메이션 */
        .tab-item::after {
            content: ''; position: absolute; bottom: 0; left: 50%; width: 0; height: 2px;
            background-color: #111; transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            transform: translateX(-50%);
        }
        .tab-item.active::after { width: 100%; }

        /* === 슬라이드 컨테이너 (슉슉 옆으로 부드럽게 넘어가게 처리) === */
        .slider-wrapper {
            flex: 1;
            width: 100%;
            overflow: hidden;
            position: relative;
        }
        .slider-track {
            display: flex;
            width: 300%; /* 3개 카테고리 분량 */
            height: 100%;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1); /* 부드러운 옆슬라이딩 효과 */
        }
        .tab-content {
            width: 33.333%;
            height: 100%;
            overflow-y: auto;
            padding: 10px 20px max(30px, env(safe-area-inset-bottom)) 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        /* 스크롤바 숨김 */
        .tab-content::-webkit-scrollbar { display: none; }

        /* === 1,3번 항목: 가로형 카드 디자인 (화이트 글래스모피즘 반영) === */
        .card {
            width: 100%;
            height: 125px; /* 모바일 가로 긴 카드 최적의 컴팩트 높이 */
            background: rgba(255, 255, 255, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
            display: flex;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            position: relative;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .card:hover, .card:active {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.65);
            border-color: rgba(255, 255, 255, 0.9);
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        /* 왼쪽 1/3 화이트 불투명 텍스트 고정 영역 */
        .card-left-text {
            width: 60%; /* 모바일 기준 가독성을 위해 텍스트 비중 60% 확대 */
            height: 100%;
            background: rgba(255, 255, 255, 0.75); /* 맑은 흰색 불투명 패드 */
            backdrop-filter: blur(5px);
            padding: 12px 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 5;
            border-right: 1px solid rgba(255, 255, 255, 0.4);
        }
        .card-top-info {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        .card-title {
            font-size: 14px;
            font-weight: 700;
            color: #111;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        /* 줄거리 요약: 2줄 한계선 후 이쁘게 말줄임표 처리 */
        .card-summary {
            font-size: 11px;
            color: #666;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-date {
            font-size: 10px;
            color: #999;
            font-weight: 500;
        }

        /* 오른쪽 2/3 영역 (이미지 꽉 채움 또는 노이미지 백그라운드) */
        .card-right-thumb {
            width: 40%;
            height: 100%;
            position: relative;
            background: rgba(255, 255, 255, 0.1);
        }
        .card-img {
            width: 100%; height: 100%; object-fit: cover;
        }
        /* 노이미지일 때도 깔끔하게 통일감 유지 */
        .card-no-img-text {
            width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
            font-size: 11px; color: rgba(0,0,0,0.15); font-weight: bold; letter-spacing: 1px;
        }

        /* 6번 항목: 동적 태그 레이아웃 디자인 */
        .tag-container {
            position: absolute;
            bottom: 8px;
            right: 8px;
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            justify-content: flex-end;
            z-index: 10;
        }
        .tag-badge {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(0,0,0,0.06);
            padding: 3px 6px;
            border-radius: 6px;
            font-size: 9px;
            font-weight: 600;
            color: #555;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        /* === PC 버전 보정 가로 와이드 핏 === */
        @media (min-width: 768px) {
            header { padding: 40px 40px 15px 40px; }
            .tab-menu { gap: 50px; }
            .tab-item { font-size: 17px; }
            
            .tab-content {
                padding: 20px 40px 40px 40px;
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); /* 가로로 나열되도록 */
                gap: 20px;
            }
            .card { height: 140px; }
            .card-left-text { width: 55%; padding: 15px; }
            .card-right-thumb { width: 45%; }
            .card-title { font-size: 16px; }
            .card-summary { font-size: 12px; -webkit-line-clamp: 2; }
            .card-date { font-size: 11px; }
            .tag-badge { font-size: 10px; padding: 4px 8px; }
        }
    </style>
</head>
<body>

<div id="archive-container">
    <div class="content-layer">

        <header>
            <div class="header-top">
                <a href="../" class="back-btn"><iconify-icon icon="solar:alt-arrow-left-linear"></iconify-icon></a>
            </div>
            <div class="tab-menu">
                <div class="tab-item active" onclick="switchTab(0)">데일리</div>
                <div class="tab-item" onclick="switchTab(1)">이벤트</div>
                <div class="tab-item" onclick="switchTab(2)">AU</div>
            </div>
        </header>

        <div class="slider-wrapper">
            <div class="slider-track" id="slider-track">
                <div class="tab-content" id="list-daily"></div>
                <div class="tab-content" id="list-event"></div>
                <div class="tab-content" id="list-au"></div>
            </div>
        </div>

    </div>
</div>

<script>
    // 3단 슬라이드 트랙 이동 로직
    const track = document.getElementById('slider-track');
    const tabs = document.querySelectorAll('.tab-item');

    function switchTab(index) {
        // 활성화 밑줄 이동
        tabs.forEach(tab => tab.classList.remove('active'));
        tabs[index].classList.add('active');
        
        // 트랙 슉 이동 처리
        track.style.transform = `translateX(-${index * 33.333}%)`;
    }

    // 부드러운 글로벌 링크 이동 페이드 애니메이션 효과
    function smoothLink(url) {
        const container = document.getElementById('archive-container');
        container.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
        container.style.opacity = '0';
        container.style.transform = 'scale(0.98)';
        setTimeout(() => { window.location.href = url; }, 300);
    }

    // list.html 연동 해석 스크립트
    document.addEventListener('DOMContentLoaded', () => {
        fetch('list.html')
            .then(response => response.text())
            .then(html => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const items = doc.querySelectorAll('.memory-data');

                items.forEach(item => {
                    const id = item.getAttribute('data-id');
                    const category = item.getAttribute('data-category') || 'daily';
                    const rawTags = item.getAttribute('data-tag') || '';
                    const imgUrl = item.getAttribute('data-img');
                    const date = item.getAttribute('data-date');
                    
                    const title = item.querySelector('.memory-title').innerHTML;
                    const summary = item.querySelector('.memory-summary').innerHTML;

                    // 카드 엘리먼트 동적 조립
                    const card = document.createElement('a');
                    card.className = 'card';
                    card.href = `javascript:smoothLink('dialog/${id}.html')`;

                    // 우측 썸네일 분기 (이미지 有 / 無)
                    let rightThumbHtml = '';
                    if(imgUrl && imgUrl.trim() !== "") {
                        rightThumbHtml = `<img src="${imgUrl}" class="card-img" alt="${title}">`;
                    } else {
                        rightThumbHtml = `<div class="card-no-img-text">FEARLESS</div>`;
                    }

                    // 태그 파싱 분기
                    let tagsHtml = '<div class="tag-container">';
                    if(rawTags.trim() !== "") {
                        rawTags.split(',').forEach(t => {
                            tagsHtml += `<span class="tag-badge">#${t.trim()}</span>`;
                        });
                    }
                    tagsHtml += '</div>';

                    // 1/3 레이아웃 주입 고정
                    card.innerHTML = `
                        <div class="card-left-text">
                            <div class="card-top-info">
                                <div class="card-title">${title}</div>
                                <div class="card-summary">${summary}</div>
                            </div>
                            <div class="card-date">${date}</div>
                        </div>
                        <div class="card-right-thumb">
                            ${rightThumbHtml}
                            ${tagsHtml}
                        </div>
                    `;

                    // 매칭되는 카테고리 탭 리스트 공간에 배정 분배
                    const targetTarget = document.getElementById(`list-${category}`);
                    if(targetTarget) targetTarget.appendChild(card);
                });
            })
            .catch(err => console.error('데이터 파싱 오류:', err));
    });
</script>

</body>
</html>
