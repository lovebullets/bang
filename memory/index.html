<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memory Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <style>
        /* === 기본 리셋 및 폰트 강제 지정 === */
        * { 
            margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; 
            font-family: 'Noto Serif KR', serif !important; /* 지정 폰트로 전면 강제 무장 */
        }
        
        body, html {
            width: 100%;
            height: 100dvh;
            overflow: hidden;
            background-color: #1B1B1B; /* 배경 지정색 고정 */
        }

        /* 글로벌 페이드인 애니메이션 */
        @keyframes pageFadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        #archive-container {
            position: relative;
            width: 100vw;
            height: 100dvh;
            background-color: #1B1B1B;
            animation: pageFadeIn 0.4s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        .content-layer {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        /* === 상단 헤더 UI (뒤로가기 & 영어 변경 탭) === */
        header {
            width: 100%;
            padding: max(20px, env(safe-area-inset-top)) 20px 10px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .header-top {
            display: flex;
            align-items: center;
            position: relative;
            height: 30px;
        }
        .back-btn {
            position: absolute;
            left: 0;
            color: #F9F9F8; /* 눈이 편안한 아이보리 오프화이트 */
            text-decoration: none;
            font-size: 26px;
            display: flex;
            align-items: center;
            transition: all 0.2s;
            filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.5));
        }
        .back-btn:active { transform: scale(0.9) translateX(-3px); }
        
        /* 1번 항목: 영어 표기 전환 (DAILY / EVENT / AU) */
        .tab-menu {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 35px;
            width: 100%;
        }
        .tab-item {
            font-size: 14px;
            font-weight: 700;
            color: rgba(249, 249, 248, 0.4); /* 기본값 투명도 조절 */
            cursor: pointer;
            padding-bottom: 6px;
            position: relative;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }
        .tab-item.active {
            color: #F9F9F8;
            font-weight: 900;
            text-shadow: 0px 0px 10px rgba(249,249,248,0.3);
        }
        .tab-item::after {
            content: ''; position: absolute; bottom: 0; left: 50%; width: 0; height: 2px;
            background-color: #F9F9F8; transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            transform: translateX(-50%);
        }
        .tab-item.active::after { width: 100%; }

        /* 3번 항목: 카테고리 밑에 단독으로 뜨는 동그란 필터 태그 모음 플레이스 */
        .category-tag-bar {
            display: flex;
            gap: 8px;
            padding: 0 20px 10px 20px;
            overflow-x: auto;
            width: 100%;
        }
        .category-tag-bar::-webkit-scrollbar { display: none; }
        .filter-tag-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(249, 249, 248, 0.15);
            padding: 5px 14px;
            border-radius: 20px; /* 레퍼런스 같은 동그란 알약 캡슐 핏 */
            font-size: 11px;
            color: rgba(249, 249, 248, 0.7);
            white-space: nowrap;
            transition: all 0.2s;
            cursor: pointer;
        }
        .filter-tag-btn.active, .filter-tag-btn:active {
            background: #F9F9F8;
            color: #1B1B1B;
            border-color: #F9F9F8;
        }

        /* === 슬라이드 컨테이너 === */
        .slider-wrapper {
            flex: 1;
            width: 100%;
            overflow: hidden;
            position: relative;
        }
        .slider-track {
            display: flex;
            width: 300%;
            height: 100%;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .tab-content {
            width: 33.333%;
            height: 100%;
            overflow-y: auto;
            padding: 10px 20px max(30px, env(safe-area-inset-bottom)) 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .tab-content::-webkit-scrollbar { display: none; }

        /* === 가로 와이드형 카드 뼈대 디자인 === */
        .card {
            width: 100%;
            height: 150px; /* 가독성 및 정밀 배치를 위한 최적 높이 증대 */
            background: #262626; /* 기본 카드 베이스 다크 그레이 */
            border-radius: 14px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            display: flex;
            overflow: hidden;
            text-decoration: none;
            position: relative;
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .card:active {
            transform: scale(0.98);
        }

        /* === 4번 항목: 절대 공식 하이라이트 (왼쪽 1/4 고정 -> 1/2 서서히 투명 그라데이션) === */
        .card-scenery-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            /* 0%~25% 구간은 완전한 불투명 밀크 화이트 패드 적용 -> 50% 지점까지 완전 소멸 스무스 그라데이션 */
            background: linear-gradient(to right, 
                rgba(249, 249, 248, 0.95) 0%, 
                rgba(249, 249, 248, 0.95) 25%, 
                rgba(249, 249, 248, 0.4) 38%,
                rgba(249, 249, 248, 0) 50%
            );
            z-index: 5;
            pointer-events: none; /* 터치 간섭 증발 */
        }

        /* 텍스트 내용물 절대 배치 제어 */
        .card-inner-info {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            padding: 16px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
        }

        /* 5번 항목 상단 파트: 제목과 줄거리 요약 (왼쪽 하단 몰아주기 레이아웃화) */
        .card-bottom-left-group {
            position: absolute;
            bottom: 16px;
            left: 16px;
            width: 50%; /* 그라데이션 안전 영역인 왼쪽 절반 내로 가둠 */
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .card-title {
            font-size: 15px;
            font-weight: 900;
            color: #1B1B1B; /* 흰 배경 위라 깊고 뚜렷하게 다크 지정 */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-summary {
            font-size: 11px;
            color: #444444;
            line-height: 1.4;
            font-weight: 500;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 5번 항목 하단 파트: 날짜 (오른쪽 하단 몰아주기 배정) */
        .card-bottom-right-group {
            position: absolute;
            bottom: 16px;
            right: 16px;
            text-align: right;
        }
        .card-date {
            font-size: 11px;
            color: #F9F9F8; /* 뒷배경 사진 영역 위라 맑은 화이트 계열로 보정 */
            font-weight: 700;
            letter-spacing: 0.5px;
            background: rgba(0,0,0,0.3); /* 사진 위 가독성을 위한 가벼운 차광막 패드 */
            padding: 3px 8px;
            border-radius: 4px;
            backdrop-filter: blur(2px);
        }

        /* === 4번 항목 우측 1/2 온전한 단독 일러스트 스페이스 === */
        .card-illustration-frame {
            position: absolute;
            top: 0; right: 0; width: 100%; height: 100%;
            z-index: 1;
        }
        .card-img {
            width: 100%; height: 100%; object-fit: cover;
            object-position: center right; /* 이미지 중심을 우측으로 유도 */
        }
        .card-no-img-placeholder {
            width: 100%; height: 100%;
            background: #333333;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 40px;
            font-size: 12px;
            color: rgba(249,249,248,0.15);
            font-weight: 700;
            letter-spacing: 2px;
        }

        /* === PC 버전 대화면 격자 보정 뷰 === */
        @media (min-width: 768px) {
            header { padding: 40px 40px 10px 40px; }
            .category-tag-bar { padding: 0 40px 15px 40px; gap: 12px; }
            .tab-menu { gap: 60px; }
            .tab-item { font-size: 16px; }
            
            .tab-content {
                padding: 20px 40px 40px 40px;
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
                gap: 25px;
            }
            .card { height: 165px; }
            .card-bottom-left-group { bottom: 20px; left: 20px; width: 52%; }
            .card-bottom-right-group { bottom: 20px; right: 20px; }
            .card-title { font-size: 17px; }
            .card-summary { font-size: 12px; }
            .card-date { font-size: 12px; }
        }
    </style>
</head>
<body>

<div id="archive-container">
    <div class="content-layer">

        <header>
            <div class="header-top">
                <a href="../" class="back-btn"><iconify-icon icon="solar:alt-arrow-left-linear"></iconify-icon></a>
            </div>
            <div class="tab-menu">
                <div class="tab-item active" onclick="switchTab(0)">DAILY</div>
                <div class="tab-item" onclick="switchTab(1)">EVENT</div>
                <div class="tab-item" onclick="switchTab(2)">AU</div>
            </div>
        </header>

        <div class="category-tag-bar" id="dynamic-tag-filter-pool">
            <div class="filter-tag-btn active" onclick="filterByTag('all')">ALL</div>
            </div>

        <div class="slider-wrapper">
            <div class="slider-track" id="slider-track">
                <div class="tab-content" id="list-daily"></div>
                <div class="tab-content" id="list-event"></div>
                <div class="tab-content" id="list-au"></div>
            </div>
        </div>

    </div>
</div>

<script>
    let activeCategoryIndex = 0;
    let selectedTag = 'all';
    const track = document.getElementById('slider-track');
    const tabs = document.querySelectorAll('.tab-item');
    let allCardDataElements = []; // 필터 처리를 위한 전역 풀링

    // 1단 슬라이드 및 탭 전환 모듈
    function switchTab(index) {
        activeCategoryIndex = index;
        tabs.forEach(tab => tab.classList.remove('active'));
        tabs[index].classList.add('active');
        track.style.transform = `translateX(-${index * 33.333}%)`;
        
        // 카테고리가 바뀌면 태그 필터링 리셋 연동
        filterByTag('all');
        updateTagActiveState();
    }

    // 4번 항목 트랜지션 애니메이션 링크 이동 연산
    function smoothLink(url) {
        const container = document.getElementById('archive-container');
        container.style.transition = 'opacity 0.25s ease, transform 0.25s ease';
        container.style.opacity = '0';
        container.style.transform = 'translateY(-4px)';
        setTimeout(() => { window.location.href = url; }, 250);
    }

    // 태그 기반 필터 스위칭 실행기
    function filterByTag(tagName) {
        selectedTag = tagName;
        updateTagActiveState();

        allCardDataElements.forEach(cardPack => {
            const cardTags = cardPack.tags;
            const element = cardPack.domElement;
            
            if(tagName === 'all' || cardTags.includes(tagName)) {
                element.style.display = 'flex';
            } else {
                element.style.display = 'none';
            }
        });
    }

    function updateTagActiveState() {
        const tagButtons = document.querySelectorAll('.filter-tag-btn');
        tagButtons.forEach(btn => {
            if(btn.textContent.replace('#', '').trim() === selectedTag.toUpperCase()) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
    }

    // `list.html` 실시간 데이터 파싱 및 가공 코어 엔진
    document.addEventListener('DOMContentLoaded', () => {
        const tagPoolContainer = document.getElementById('dynamic-tag-filter-pool');
        const uniqueTagsTracker = new Set();

        fetch('list.html')
            .then(response => response.text())
            .then(html => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const items = doc.querySelectorAll('.memory-data');

                items.forEach(item => {
                    const id = item.getAttribute('data-id');
                    const category = item.getAttribute('data-category') || 'daily';
                    const rawTags = item.getAttribute('data-tag') || '';
                    const imgUrl = item.getAttribute('data-img');
                    const date = item.getAttribute('data-date');
                    
                    const title = item.querySelector('.memory-title').innerHTML;
                    const summary = item.querySelector('.memory-summary').innerHTML;

                    // 동적 태그 전역 트래킹 누적 연산
                    const processedTagsArray = [];
                    if(rawTags.trim() !== "") {
                        rawTags.split(',').forEach(t => {
                            const cleaned = t.trim();
                            if(cleaned) {
                                uniqueTagsTracker.add(cleaned);
                                processedTagsArray.push(cleaned);
                            }
                        });
                    }

                    // 가로형 카드 동적 오브젝트 하우징 조립
                    const card = document.createElement('a');
                    card.className = 'card';
                    card.href = `javascript:smoothLink('dialog/${id}.html')`;

                    // 4번 항목 우측 절반 레이어 (이미지 有 / 無 처리 분기)
                    let rightSectionHtml = '';
                    if(imgUrl && imgUrl.trim() !== "") {
                        rightSectionHtml = `<img src="${imgUrl}" class="card-img" alt="${title}">`;
                    } else {
                        rightSectionHtml = `<div class="card-no-img-placeholder">FEARLESS</div>`;
                    }

                    // 4, 5번 항목 완벽한 정밀 레이아웃 주입
                    card.innerHTML = `
                        <div class="card-scenery-overlay"></div>
                        <div class="card-illustration-frame">
                            ${rightSectionHtml}
                        </div>
                        <div class="card-inner-info">
                            <div class="card-bottom-left-group">
                                <div class="card-title">${title}</div>
                                <div class="card-summary">${summary}</div>
                            </div>
                            <div class="card-bottom-right-group">
                                <div class="card-date">${date}</div>
                            </div>
                        </div>
                    `;

                    // 전역 데이터 풀에 수납 개체 매핑 등록
                    allCardDataElements.push({
                        category: category,
                        tags: processedTagsArray,
                        domElement: card
                    });

                    // 분배 트랙 세팅 실행
                    const targetContainer = document.getElementById(`list-${category}`);
                    if(targetContainer) targetContainer.appendChild(card);
                });

                // 3단 필터 인터페이스 - 알약 태그 리스트 누적 동적 생성
                uniqueTagsTracker.forEach(tagName => {
                    const tagBtn = document.createElement('div');
                    tagBtn.className = 'filter-tag-btn';
                    tagBtn.textContent = `#${tagName.toUpperCase()}`;
                    tagBtn.onclick = () => filterByTag(tagName);
                    tagPoolContainer.appendChild(tagBtn);
                });
            })
            .catch(err => console.error('기억의 데이터베이스 처리 장애 발생:', err));
    });
</script>

</body>
</html>
