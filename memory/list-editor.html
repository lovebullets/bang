<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FEARLESS - Memory List Editor</title>
<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
<style>
:root { --bg: #f2f2f7; --card-bg: rgba(255, 255, 255, 0.7); --blue: #007aff; --text: #1c1c1e; --sub-text: #8e8e93; }
body { margin: 0; padding: 20px; background-color: var(--bg); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: var(--text); padding-bottom: 40px; font-size: 12px; }
* { box-sizing: border-box; }
h1 { font-size: 22px; font-weight: 700; margin-bottom: 20px; text-align: center; }

.container { max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
.section { background: var(--card-bg); backdrop-filter: blur(20px); border-radius: 16px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: transform 0.2s, opacity 0.2s; }
.section-title { font-size: 15px; font-weight: 600; margin-top: 0; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }

textarea { width: 100%; height: 120px; border: 1px solid #d1d1d6; border-radius: 12px; padding: 12px; font-family: monospace; font-size: 12px; resize: vertical; outline: none; transition: border-color 0.2s; }
textarea:focus { border-color: var(--blue); }
input[type="text"], select { width: 100%; border: 1px solid #d1d1d6; border-radius: 8px; padding: 10px 12px; font-size: 13px; outline: none; transition: border-color 0.2s; background: #fff; }
input[type="text"]:focus, select:focus { border-color: var(--blue); }

label { font-size: 11px; color: var(--sub-text); margin-bottom: 4px; display: block; font-weight: 600; }

.btn { display: inline-flex; align-items: center; justify-content: center; gap: 5px; background: var(--blue); color: #fff; border: none; border-radius: 10px; padding: 10px 16px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.2s, color 0.2s, opacity 0.2s, transform 0.1s; }
.btn:active { transform: scale(0.96); opacity: 0.8; }
.btn-secondary { background: #e5e5ea; color: var(--text); }
.btn-danger { background: #ff3b30; color: #fff; padding: 6px 10px; font-size: 12px; }
.btn-icon { background: transparent; color: var(--sub-text); padding: 5px; font-size: 20px; cursor: pointer; border: none; }
.btn-icon:hover { color: var(--blue); }

.item-card { background: #fff; border: 1px solid #e5e5ea; border-radius: 12px; padding: 15px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; animation: fadeIn 0.3s ease forwards; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.item-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f0f0f0; padding-bottom: 10px; margin-bottom: 5px; }
.item-controls { display: flex; gap: 5px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* 모바일 화면에서 인풋칸 찌그러짐 방지 */
@media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; } }

.action-bar { display: flex; gap: 10px; justify-content: flex-end; margin-top: 15px; }
</style>
</head>
<body>

<h1><i class="ri-gallery-fill" style="color: #007aff;"></i> FEARLESS Memory Editor</h1>

<div class="container">
    <div class="section">
        <h2 class="section-title"><i class="ri-download-cloud-2-line"></i> 기존 데이터 불러오기</h2>
        <p style="font-size: 11px; color: var(--sub-text); margin-top: 0;">memory/list.html 파일의 순수 데이터를 붙여넣으세요.</p>
        <textarea id="import-area" placeholder="<div class='memory-data'>... 덩어리를 여기에 붙여넣기"></textarea>
        <div style="text-align: right; margin-top: 10px;">
            <button class="btn" onclick="parseHTML()"><i class="ri-refresh-line"></i> 데이터 동기화</button>
        </div>
    </div>

    <div class="section">
        <h2 class="section-title"><i class="ri-list-check-2"></i> 기억(Memory) 목록 편집</h2>
        <div id="editor-list"></div>
        <button class="btn btn-secondary" style="width: 100%; margin-top: 10px;" onclick="addNewItem()"><i class="ri-add-line"></i> 새 기억 추가하기</button>
    </div>

    <div class="section" id="export-section">
        <h2 class="section-title"><i class="ri-code-box-line"></i> 최종 순수 코드 추출</h2>
        <textarea id="export-area" readonly placeholder="하단의 '최종 코드 생성' 버튼을 누르세요."></textarea>
        <div class="action-bar">
            <button class="btn" onclick="generateHTML()"><i class="ri-magic-line"></i> 최종 코드 생성</button>
            <button class="btn btn-secondary" id="copy-btn" onclick="copyCode()"><i class="ri-clipboard-line"></i> 코드 복사</button>
        </div>
    </div>
</div>

<script>
let memoryItems = [];

// 특수문자 HTML 이스케이프 방지/보호 처리
function escapeHTML(str) {
    if (!str) return '';
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
}

// 오늘 날짜 및 ID 생성기 (KST)
function getTodayData() {
    const now = new Date();
    const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
    const kst = new Date(utc + (3600000 * 9));
    const yy = String(kst.getFullYear()).slice(-2);
    const mm = String(kst.getMonth() + 1).padStart(2, '0');
    const dd = String(kst.getDate()).padStart(2, '0');
    return {
        id: `${yy}${mm}${dd}`,
        formatted: `20${yy}. ${kst.getMonth() + 1}. ${kst.getDate()}`
    };
}

// 기존 데이터 파싱
function parseHTML() {
    const htmlString = document.getElementById('import-area').value;
    if (!htmlString.trim()) return;
    
    const parser = new DOMParser();
    const doc = parser.parseFromString(htmlString, 'text/html');
    const items = doc.querySelectorAll('.memory-data');
    
    memoryItems = [];
    items.forEach(item => {
        memoryItems.push({
            id: item.getAttribute('data-id') || '',
            category: item.getAttribute('data-category') || 'daily',
            tag: item.getAttribute('data-tag') || '',
            img: item.getAttribute('data-img') || '',
            date: item.getAttribute('data-date') || '',
            title: item.querySelector('.memory-title') ? item.querySelector('.memory-title').textContent.trim() : '',
            summary: item.querySelector('.memory-summary') ? item.querySelector('.memory-summary').textContent.trim() : ''
        });
    });
    
    renderEditor();
    alert('데이터를 성공적으로 동기화했습니다!');
}

function updateItem(index, key, value) {
    memoryItems[index][key] = value;
}

// 항목 순서 이동
function moveItem(index, dir) {
    if (index + dir < 0 || index + dir >= memoryItems.length) return;
    const temp = memoryItems[index];
    memoryItems[index] = memoryItems[index + dir];
    memoryItems[index + dir] = temp;
    renderEditor();
}

// 항목 삭제
function removeItem(index) {
    if (confirm('정말로 이 카드를 삭제하시겠습니까?')) {
        memoryItems.splice(index, 1);
        renderEditor();
    }
}

// 새 항목 추가
function addNewItem() {
    const today = getTodayData();
    memoryItems.push({
        id: today.id,
        category: 'daily',
        tag: '',
        img: '',
        date: today.formatted,
        title: '새로운 기억',
        summary: ''
    });
    renderEditor();
}

// UI 렌더링
function renderEditor() {
    const list = document.getElementById('editor-list');
    list.innerHTML = '';
    
    if (memoryItems.length === 0) {
        list.innerHTML = '<p style="text-align:center; color: var(--sub-text); padding: 20px;">생성된 메모리 카드가 없습니다.</p>';
        return;
    }
    
    memoryItems.forEach((item, index) => {
        list.innerHTML += `
        <div class="item-card">
            <div class="item-header">
                <strong>#${index + 1} 기억 편집</strong>
                <div class="item-controls">
                    <button class="btn-icon" onclick="moveItem(${index}, -1)"><i class="ri-arrow-up-line"></i></button>
                    <button class="btn-icon" onclick="moveItem(${index}, 1)"><i class="ri-arrow-down-line"></i></button>
                    <button class="btn btn-danger" onclick="removeItem(${index})"><i class="ri-delete-bin-line"></i></button>
                </div>
            </div>
            <div class="grid-2">
                <div>
                    <label>ID (dialog 폴더 파일명)</label>
                    <input type="text" value="${escapeHTML(item.id)}" placeholder="ex) 260628" onchange="updateItem(${index}, 'id', this.value)">
                </div>
                <div>
                    <label>카테고리</label>
                    <select onchange="updateItem(${index}, 'category', this.value)">
                        <option value="daily" ${item.category === 'daily' ? 'selected' : ''}>DAILY</option>
                        <option value="event" ${item.category === 'event' ? 'selected' : ''}>EVENT</option>
                        <option value="au" ${item.category === 'au' ? 'selected' : ''}>AU</option>
                    </select>
                </div>
            </div>
            <div class="grid-2">
                <div>
                    <label>날짜</label>
                    <input type="text" value="${escapeHTML(item.date)}" placeholder="2026. 06. 28" onchange="updateItem(${index}, 'date', this.value)">
                </div>
                <div>
                    <label>태그 (쉼표로 구분)</label>
                    <input type="text" value="${escapeHTML(item.tag)}" placeholder="데이트, 현대물AU" onchange="updateItem(${index}, 'tag', this.value)">
                </div>
            </div>
            <div>
                <label>배경 이미지 링크 (없으면 비워두기)</label>
                <input type="text" value="${escapeHTML(item.img)}" placeholder="https://..." onchange="updateItem(${index}, 'img', this.value)">
            </div>
            <div>
                <label>제목</label>
                <input type="text" value="${escapeHTML(item.title)}" onchange="updateItem(${index}, 'title', this.value)">
            </div>
            <div>
                <label>줄거리 요약</label>
                <textarea style="height: 70px;" onchange="updateItem(${index}, 'summary', this.value)">${escapeHTML(item.summary)}</textarea>
            </div>
        </div>`;
    });
}

// 최종 HTML 생성
function generateHTML() {
    let finalCode = '';
    
    memoryItems.forEach(item => {
        finalCode += `<div class="memory-data" \n     data-id="${escapeHTML(item.id)}" \n     data-category="${escapeHTML(item.category)}" \n     data-tag="${escapeHTML(item.tag)}" \n     data-img="${item.img ? escapeHTML(item.img) : ''}" \n     data-date="${escapeHTML(item.date)}">\n    <div class="memory-title">${escapeHTML(item.title)}</div>\n    <div class="memory-summary">${escapeHTML(item.summary)}</div>\n</div>\n\n`;
    });
    
    document.getElementById('export-area').value = finalCode.trim();
}

// 코드 복사 애니메이션 효과
function copyCode() {
    const exportArea = document.getElementById('export-area');
    if(!exportArea.value) return;

    exportArea.select();
    document.execCommand('copy');
    
    const copyBtn = document.getElementById('copy-btn');
    const originalText = copyBtn.innerHTML;
    const originalBg = copyBtn.style.background;
    
    copyBtn.innerHTML = '<i class="ri-check-line"></i> 복사 완료!';
    copyBtn.style.background = '#34c759'; 
    copyBtn.style.color = '#fff';
    
    setTimeout(() => {
        copyBtn.innerHTML = originalText;
        copyBtn.style.background = originalBg;
        copyBtn.style.color = 'var(--text)'; 
    }, 2000);
}
</script>
</body>
</html>
