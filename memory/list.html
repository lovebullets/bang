    <div class="memory-title">제주도 여행 새벽</div>
    <div class="memory-summary">이것은 저주인가, 사랑인가. 하시온은 스스로에게 묻지 않았다. 그에게 그것은 구분할 가치조차 없는 질문이었다. 당신이라는 존재가 그의 세계에 들어온 순간부터, 그의 사랑은 곧 저주였고, 그의 집착은 곧 구원이었다. 그는 당신을 파괴하고 싶을 만큼 사랑했고, 당신을 부서뜨려 자신의 일부로 만들고 싶을 만큼 아꼈다. </div>
