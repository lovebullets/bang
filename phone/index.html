<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FEARLESS - Home</title>
<style>
/* --- 공통 반응형 폰 프레임 로직 --- */
body {
    margin: 0; padding: 0;
    background-color: #e5e5ea; /* PC 환경 배경색 */
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overflow: hidden;
}

/* 스마트폰 디바이스 프레임 */
.device-frame {
    position: relative;
    width: 100%; height: 100vh; /* 모바일 기본값: 꽉 찬 화면 */
    background: url('https://i.ibb.co/VYrHdHd8/IMG-6825.jpg') center/cover no-repeat; /* 배경화면 (임시 뱅 사진) */
    background-color: #000;
    overflow: hidden;
    animation: fadeIn 0.4s ease-out;
}
.device-frame::before {
    content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.4); /* 배경화면 어둡게 처리 (아이콘 가독성) */
    z-index: 1;
}

/* PC, 태블릿 환경 (화면이 넓을 때 스마트폰 프레임 씌우기) */
@media (min-width: 768px) {
    .device-frame {
        width: 390px; height: 844px; /* iPhone 13/14 Pro 사이즈 */
        border-radius: 45px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        border: 12px solid #1c1c1e; /* 폰 베젤 */
    }
    /* 상단 노치/다이내믹 아일랜드 디자인 */
    .device-notch {
        position: absolute; top: 0; left: 50%; transform: translateX(-50%);
        width: 120px; height: 30px; background-color: #1c1c1e;
        border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; z-index: 999;
    }
}
@keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

/* --- 홈 화면 앱 아이콘 UI --- */
.home-screen {
    position: relative; z-index: 10;
    width: 100%; height: 100%;
    display: flex; flex-direction: column; padding: 50px 20px 20px; box-sizing: border-box;
}
.app-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px 15px; margin-top: 20px;
}
.app-icon-wrapper {
    display: flex; flex-direction: column; align-items: center; cursor: pointer;
    transition: transform 0.2s;
}
.app-icon-wrapper:active { transform: scale(0.9); }
.app-icon {
    width: 60px; height: 60px; border-radius: 14px; display: flex; justify-content: center; align-items: center;
    font-size: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}
.app-name {
    color: white; font-size: 11px; margin-top: 5px; font-weight: 500; text-shadow: 0 1px 2px rgba(0,0,0,0.5);
}
/* 앱 아이콘 색상 설정 */
.icon-msg { background-color: #34c759; color: white; } /* 메시지 앱 */
.icon-fearless { background-color: #1c1c1e; color: #ff3b30; font-weight: 900; } /* 세계관 전용 앱 */
</style>
</head>
<body>

<div class="device-frame">
    <div class="device-notch"></div>
    <div class="home-screen">
        <div class="app-grid">
            <!-- 메시지 앱: 클릭 시 phone/message/index.html 로 이동 -->
            <div class="app-icon-wrapper" onclick="location.href='message/index.html'">
                <div class="app-icon icon-msg">💬</div>
                <div class="app-name">메시지</div>
            </div>
            
            <!-- FEARLESS 임무 앱 (예비용) -->
            <div class="app-icon-wrapper">
                <div class="app-icon icon-fearless">F</div>
                <div class="app-name">FEARLESS</div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
