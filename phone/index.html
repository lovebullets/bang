<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FEARLESS - Home</title>
<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
<style>
/* --- 공통 반응형 및 배경 --- */
body {
    margin: 0; padding: 0; background-color: #e5e5ea;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overflow: hidden;
}

/* 스마트폰 프레임 (모바일: 꽉 찬 화면, 픽스) */
.device-frame {
    position: relative; width: 100%; height: 100vh;
    background-color: #000; overflow: hidden;
}

/* ▼▼▼ 배경화면 이미지를 수정하는 곳입니다 ▼▼▼ */
.device-bg {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    /* URL 안의 링크를 원하는 배경화면 링크로 변경하세요 */
    background: url('https://i.ibb.co/VYrHdHd8/IMG-6825.jpg') center/cover no-repeat;
    z-index: 0; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.device-bg::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.35); }
/* ▲▲▲ 배경화면 수정 끝 ▲▲▲ */

/* PC/태블릿 환경: 아이폰 17 스타일 얇은 베젤 및 다이내믹 아일랜드 */
@media (min-width: 768px) {
    .device-frame {
        width: 393px; height: 852px; border-radius: 55px;
        box-shadow: 0 0 0 2px #333, 0 30px 60px rgba(0,0,0,0.3);
        border: 8px solid #1c1c1e; /* 아이폰 17 기준 얇은 베젤 */
    }
    .dynamic-island {
        position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
        width: 120px; height: 35px; background-color: #000; border-radius: 20px; z-index: 999;
    }
}

/* 상단 상태바 (시계 및 아이콘) */
.status-bar {
    position: absolute; top: 15px; width: 100%; display: flex; justify-content: space-between;
    padding: 0 25px; box-sizing: border-box; z-index: 998;
    font-size: 15px; font-weight: 600; color: white; pointer-events: none;
}
.status-icons i { margin-left: 4px; font-size: 14px; }

/* 홈 스크린 앱 레이아웃 및 확대 애니메이션 */
.home-screen {
    position: relative; z-index: 10; width: 100%; height: 100%;
    display: flex; flex-direction: column; padding: 60px 20px 20px; box-sizing: border-box;
    transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 0.3s ease;
    animation: zoomOutApp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
}
@keyframes zoomOutApp { from { transform: scale(1.2); opacity: 0; } to { transform: scale(1); opacity: 1; } }

.app-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px 15px; margin-top: 20px; }
.app-icon-wrapper { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
.app-icon-wrapper:active .app-icon { transform: scale(0.85); opacity: 0.8; }
.app-icon { width: 60px; height: 60px; border-radius: 16px; display: flex; justify-content: center; align-items: center; font-size: 32px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); transition: all 0.2s; }
.app-name { color: white; font-size: 11px; margin-top: 5px; font-weight: 500; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
.icon-msg { background-color: #34c759; color: white; }
.icon-fearless { background-color: #1c1c1e; color: #ff3b30; font-weight: 900; }
</style>
</head>
<body>

<div class="device-frame">
    <div class="dynamic-island"></div>
    <div class="status-bar">
        <span class="status-time">00:00</span>
        <span class="status-icons"><i class="ri-signal-wifi-fill"></i><i class="ri-battery-fill"></i></span>
    </div>
    
    <div class="device-bg" id="home-bg"></div>

    <div class="home-screen" id="home-screen">
        <div class="app-grid">
            <div class="app-icon-wrapper" onclick="launchApp('message/index.html#list')">
                <div class="app-icon icon-msg"><i class="ri-message-3-fill"></i></div>
                <div class="app-name">메시지</div>
            </div>
            
            <div class="app-icon-wrapper">
                <div class="app-icon icon-fearless"><i class="ri-shield-cross-fill"></i></div>
                <div class="app-name">FEARLESS</div>
            </div>
        </div>
    </div>
</div>

<script>
// 한국 표준시(KST) 리얼타임 시계 로직
function updateClock() {
    const now = new Date();
    const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
    const kst = new Date(utc + (3600000 * 9)); // KST 오프셋
    let h = kst.getHours();
    let m = kst.getMinutes();
    h = h < 10 ? '0' + h : h;
    m = m < 10 ? '0' + m : m;
    document.querySelector('.status-time').innerText = `${h}:${m}`;
}
setInterval(updateClock, 1000); updateClock();

// 앱 실행 시 iOS 스타일 줌인 애니메이션
function launchApp(url) {
    const screen = document.getElementById('home-screen');
    const bg = document.getElementById('home-bg');
    screen.style.transform = 'scale(2.5)'; // 아이콘 쪽으로 빨려들어가는 연출
    screen.style.opacity = '0';
    bg.style.transform = 'scale(1.2)'; // 배경도 살짝 확대
    setTimeout(() => { location.href = url; }, 300);
}
</script>
</body>
</html>
