<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>메시지</title>
<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
<style>
/* 12px 베이스 및 공통 셋업 */
body { margin: 0; padding: 0; background-color: #e5e5ea; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-size: 12px; overflow: hidden; }

.device-frame { position: relative; width: 100%; height: 100vh; background-color: #fff; overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.05); }

.status-bar { display: none; }
@media (min-width: 768px) { 
    .device-frame { width: 393px; height: 852px; border-radius: 55px; box-shadow: 0 0 0 2px #333, 0 30px 60px rgba(0,0,0,0.3); border: 4px solid #1c1c1e; } 
    .dynamic-island { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 120px; height: 35px; background-color: #000; border-radius: 20px; z-index: 999; } 
    .status-bar { display: flex; position: absolute; top: 15px; width: 100%; justify-content: space-between; padding: 0 25px; box-sizing: border-box; z-index: 998; font-size: 14px; font-weight: 600; color: #1c1c1e; pointer-events: none; }
    .status-icons i { margin-left: 4px; font-size: 14px; }
}

.app-inner { position: relative; width: 100%; height: 100%; background-color: #fff; animation: zoomInApp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
@keyframes zoomInApp { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

.view-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: #fff; overflow-y: auto; overflow-x: hidden; transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94); display: flex; flex-direction: column; }
#list-view { transform: translateX(0); z-index: 10; }
#viewer-view { transform: translateX(100%); z-index: 20; background-color: transparent; }

/* 리스트 헤더 UI */
.list-header { position: sticky; top: 0; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 45px 15px 10px 15px; z-index: 30; border-bottom: 1px solid rgba(0,0,0,0.05); }
@media (max-width: 767px) { .list-header { padding-top: 15px; } }

.header-top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.nav-back-list { color: #007aff; font-size: 14px; cursor: pointer; display: inline-flex; align-items: center; font-weight: 400; letter-spacing: -0.5px; }
.nav-back-list i { font-size: 22px; font-weight: 300; margin-top: 1px; margin-right: -4px; }
.compose-btn { background: transparent; border: none; color: #007aff; font-size: 22px; cursor: pointer; padding: 0; margin-right: 5px; }
.compose-btn:active { opacity: 0.5; }

.compose-menu { position: absolute; top: 35px; right: 0; background: rgba(255, 255, 255, 0.96); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.12); display: flex; flex-direction: column; overflow: hidden; width: 140px; transform: translateY(-10px) scale(0.95); opacity: 0; pointer-events: none; transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94); z-index: 999; }
.compose-menu.active { transform: translateY(0) scale(1); opacity: 1; pointer-events: auto; }
.compose-menu-item { padding: 12px 15px; display: flex; align-items: center; justify-content: space-between; font-size: 13px; color: #1c1c1e; font-weight: 500; cursor: pointer; border-bottom: 1px solid rgba(0,0,0,0.05); text-decoration: none; }
.compose-menu-item:last-child { border-bottom: none; }
.compose-menu-item:active { background: #f2f2f7; }
.compose-menu-item i { font-size: 16px; color: #007aff; }

.list-title { font-size: 26px; font-weight: 700; color: #1c1c1e; margin-bottom: 12px; letter-spacing: -0.5px; }
.search-pill { background-color: rgba(118, 118, 128, 0.12); border-radius: 10px; display: flex; align-items: center; padding: 6px 10px; margin-bottom: 12px; }
.search-pill i { color: #8e8e93; font-size: 14px; }
.search-pill input { border: none; background: transparent; font-size: 13px; width: 100%; margin-left: 6px; outline: none; font-family: inherit; color: #1c1c1e; }
.search-pill input::placeholder { color: #8e8e93; }

.tag-container { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; }
.tag-container::-webkit-scrollbar { display: none; }
.tag { background-color: #f2f2f7; color: #1c1c1e; padding: 4px 12px; border-radius: 14px; font-size: 12px; font-weight: 500; white-space: nowrap; cursor: pointer; transition: background 0.2s; }
.tag.active { background-color: #007aff; color: white; }

.chat-list-container { flex: 1; overflow-y: auto; }
.chat-item { display: flex; padding: 10px 15px; border-bottom: 1px solid rgba(0,0,0,0.05); align-items: center; cursor: pointer; transition: background-color 0.2s; }
.chat-item:active { background-color: #f2f2f7; }
.chat-profile { width: 44px; height: 44px; border-radius: 50%; overflow: hidden; flex-shrink: 0; margin-right: 12px; }
.chat-profile img { width: 100%; height: 100%; object-fit: cover; }
.chat-info { flex: 1; min-width: 0; }
.chat-name-row { display: flex; justify-content: space-between; margin-bottom: 2px; align-items: center; }
.chat-name { font-size: 14px; font-weight: 600; color: #1c1c1e; }
.chat-date { font-size: 12px; color: #8e8e93; }
.chat-preview { font-size: 13px; color: #8e8e93; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.viewer-header { position: sticky; top: 0; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 45px 15px 10px 15px; z-index: 50; display: flex; align-items: center; border-bottom: 1px solid rgba(0,0,0,0.05); }
@media (max-width: 767px) { .viewer-header { padding-top: 15px; } }
.nav-back { color: #007aff; font-size: 15px; cursor: pointer; display: flex; align-items: center; gap: 2px; font-weight: 400; letter-spacing: -0.5px;}
.nav-back:active { opacity: 0.5; }
.nav-back i { font-size: 24px; font-weight: 300; margin-top: 1px; margin-right: -4px;}

/* ▼▼▼ 대화창(알맹이)를 감싸는 영역의 상/하단 여백 및 13px 폰트 강제 적용 ▼▼▼ */
#dynamic-content { 
    flex: 1; overflow-y: auto; background-color: #fff; position: relative; 
    /* 상단 35px, 좌우 12px, 하단 25px (모바일 브라우저 바 간섭 방지) */
    padding: 35px 12px 25px 12px; 
    box-sizing: border-box; 
    font-size: 13px !important; /* 대화창 폰트 13px로 업그레이드 */
}

/* 말풍선 내부 텍스트 13px 강제 상속 */
#dynamic-content .msg-bubble > div > div:first-child {
    font-size: 13px !important;
}
</style>
</head>
<body>

<div class="device-frame">
    <div class="dynamic-island"></div>
    <div class="status-bar"><span class="status-time">00:00</span><span class="status-icons"><i class="ri-signal-wifi-fill"></i><i class="ri-battery-fill"></i></span></div>
    
    <div class="app-inner">
        <div id="list-view" class="view-screen">
            <div class="list-header">
                <div class="header-top-row">
                    <div class="nav-back-list" onclick="exitApp()"><i class="ri-arrow-left-s-line"></i>홈</div>
                    <div style="position: relative;">
                        <button class="compose-btn" id="compose-btn"><i class="ri-edit-box-line"></i></button>
                        <div class="compose-menu" id="compose-menu">
                            <a class="compose-menu-item" href="send.html">메시지 쓰기 <i class="ri-chat-new-line"></i></a>
                            <a class="compose-menu-item" href="list-editor.html">리스트 수정 <i class="ri-list-settings-line"></i></a>
                        </div>
                    </div>
                </div>
                <div class="list-title">메시지</div>
                <div class="search-pill">
                    <i class="ri-search-line"></i>
                    <input type="text" id="msg-search" placeholder="검색">
                </div>
                <div class="tag-container" id="dynamic-tag-container"></div>
            </div>
            <div id="chat-list-container" class="chat-list-container"></div>
        </div>

        <div id="viewer-view" class="view-screen">
            <div class="viewer-header">
                <div class="nav-back" onclick="location.hash='list'"><i class="ri-arrow-left-s-line"></i>메시지</div>
            </div>
            <div id="dynamic-content"></div>
        </div>
    </div>
</div>

<script>
function updateClock() {
    const now = new Date();
    const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
    const kst = new Date(utc + (3600000 * 9));
    let h = kst.getHours(); let m = kst.getMinutes();
    h = h < 10 ? '0' + h : h; m = m < 10 ? '0' + m : m;
    const timeEl = document.querySelector('.status-time');
    if(timeEl) timeEl.innerText = `${h}:${m}`;
}
setInterval(updateClock, 1000); updateClock();

function handleRoute() {
    const hash = window.location.hash.replace('#', '');
    const listView = document.getElementById('list-view');
    const viewerView = document.getElementById('viewer-view');
    const contentArea = document.getElementById('dynamic-content');
    const listContainer = document.getElementById('chat-list-container');

    if (!hash || hash === 'list') {
        listView.style.transform = 'translateX(0)';
        viewerView.style.transform = 'translateX(100%)';
        listView.style.pointerEvents = 'auto';
        if(document.activeElement) document.activeElement.blur(); 

        if(listContainer.innerHTML.trim() === '') {
            fetch('list.html').then(r => r.text()).then(html => {
                listContainer.innerHTML = html;
                initListLogic(); 
            });
        }
    } else {
        listView.style.transform = 'translateX(-30%)';
        viewerView.style.transform = 'translateX(0)';
        listView.style.pointerEvents = 'none'; 
        contentArea.innerHTML = '<div style="text-align:center; padding: 50px;"><i class="ri-loader-4-line ri-spin" style="font-size:20px; color:#8e8e93;"></i></div>';

        fetch(`dialog/${hash}.html`).then(r => {
            if(!r.ok) throw new Error('메시지가 없습니다.'); return r.text();
        }).then(html => {
            contentArea.innerHTML = html;
            Array.from(contentArea.querySelectorAll('script')).forEach(oldScript => {
                const newScript = document.createElement('script');
                Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                oldScript.parentNode.replaceChild(newScript, oldScript);
            });
        }).catch(e => { contentArea.innerHTML = `<div style="padding: 20px; color: red;">${e.message}</div>`; });
    }
}

window.exitApp = function() {
    const inner = document.querySelector('.app-inner');
    inner.style.transition = 'all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
    inner.style.transform = 'scale(0.8)';
    inner.style.opacity = '0';
    setTimeout(() => { location.href = '../index.html'; }, 250);
}

function initListLogic() {
    const listContainer = document.getElementById('chat-list-container');
    const items = listContainer.querySelectorAll('.chat-item');
    const tagContainer = document.getElementById('dynamic-tag-container');

    let uniqueTags = new Set();
    items.forEach(item => {
        const tags = item.dataset.tags;
        if(tags) tags.split(' ').forEach(t => { if(t.trim()) uniqueTags.add(t.trim()); });
    });

    let tagHTML = '<div class="tag active" data-tag="전체">전체</div>';
    uniqueTags.forEach(tag => { tagHTML += `<div class="tag" data-tag="${tag}">${tag}</div>`; });
    tagContainer.innerHTML = tagHTML;

    const searchInput = document.getElementById('msg-search');
    const tagElements = tagContainer.querySelectorAll('.tag');

    function filterItems() {
        const keyword = searchInput.value.toLowerCase();
        const activeTag = tagContainer.querySelector('.tag.active').dataset.tag;

        items.forEach(item => {
            const name = item.querySelector('.chat-name').innerText.toLowerCase();
            const date = item.querySelector('.chat-date').innerText.toLowerCase(); 
            const itemTags = item.dataset.tags || '';
            const matchesSearch = name.includes(keyword) || date.includes(keyword);
            const matchesTag = (activeTag === '전체') || itemTags.includes(activeTag);

            if(matchesSearch && matchesTag) { item.style.display = 'flex'; }
            else { item.style.display = 'none'; }
        });
    }

    if(searchInput) searchInput.addEventListener('input', filterItems);
    
    tagElements.forEach(tagEl => {
        tagEl.addEventListener('click', (e) => {
            tagElements.forEach(t => t.classList.remove('active'));
            e.target.classList.add('active');
            filterItems();
        });
    });

    const composeBtn = document.getElementById('compose-btn');
    const composeMenu = document.getElementById('compose-menu');
    if(composeBtn && composeMenu) {
        composeBtn.addEventListener('click', function(e) {
            e.stopPropagation(); composeMenu.classList.toggle('active');
        });
        document.addEventListener('click', function() {
            if(composeMenu.classList.contains('active')) composeMenu.classList.remove('active');
        });
        composeMenu.addEventListener('click', e => e.stopPropagation());
    }
}

window.addEventListener('hashchange', handleRoute);
window.addEventListener('DOMContentLoaded', handleRoute);
</script>
</body>
</html>
