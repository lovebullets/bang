<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>메시지</title>
<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
<style>
body { margin: 0; padding: 0; background-color: #e5e5ea; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; }

/* 프레임은 고정. 절대 슬라이딩 되지 않음 */
.device-frame { position: relative; width: 100%; height: 100vh; background-color: #fff; overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
@media (min-width: 768px) { 
    .device-frame { width: 393px; height: 852px; border-radius: 55px; box-shadow: 0 0 0 2px #333, 0 30px 60px rgba(0,0,0,0.3); border: 8px solid #1c1c1e; } 
    .dynamic-island { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 120px; height: 35px; background-color: #000; border-radius: 20px; z-index: 999; } 
}

/* 상단 시계 (메시지 앱 내부는 블랙 텍스트) */
.status-bar { position: absolute; top: 15px; width: 100%; display: flex; justify-content: space-between; padding: 0 25px; box-sizing: border-box; z-index: 998; font-size: 15px; font-weight: 600; color: #1c1c1e; pointer-events: none; }
.status-icons i { margin-left: 4px; font-size: 14px; }

/* 앱 실행 시 알맹이 확대 효과 (Zoom In) */
.app-inner {
    position: relative; width: 100%; height: 100%; background-color: #fff;
    animation: zoomInApp 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
}
@keyframes zoomInApp { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

/* 뷰 전환 화면 */
.view-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: #fff; overflow-y: auto; overflow-x: hidden; transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94); display: flex; flex-direction: column; }
#list-view { transform: translateX(0); z-index: 10; }
#viewer-view { transform: translateX(100%); z-index: 20; background-color: transparent; }

/* 공통 헤더 뼈대 */
.viewer-header { position: sticky; top: 0; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); padding: 50px 15px 15px 15px; z-index: 50; display: flex; align-items: center; border-bottom: 1px solid rgba(0,0,0,0.05); }
@media (max-width: 767px) { .viewer-header { padding-top: 20px; } }
.nav-back { color: #007aff; font-size: 16px; cursor: pointer; display: flex; align-items: center; gap: 2px; }
.nav-back:active { opacity: 0.5; }
.nav-back i { font-size: 20px; font-weight: 300; }
#dynamic-content { flex: 1; overflow-y: auto; background-color: #fff; position: relative; }
</style>
</head>
<body>

<div class="device-frame">
    <div class="dynamic-island"></div>
    <div class="status-bar"><span class="status-time">00:00</span><span class="status-icons"><i class="ri-signal-wifi-fill"></i><i class="ri-battery-fill"></i></span></div>
    
    <div class="app-inner">
        <!-- 리스트 컨테이너 (list.html 내용이 fetch 되어 들어옴) -->
        <div id="list-view" class="view-screen"></div>

        <!-- 뷰어 컨테이너 (260628.html 등의 내용이 fetch 되어 들어옴) -->
        <div id="viewer-view" class="view-screen">
            <div class="viewer-header">
                <div class="nav-back" onclick="location.hash='list'"><i class="ri-arrow-left-s-line"></i>메시지</div>
            </div>
            <div id="dynamic-content"></div>
        </div>
    </div>
</div>

<script>
// KST 시계 업데이트
function updateClock() {
    const now = new Date();
    const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
    const kst = new Date(utc + (3600000 * 9));
    let h = kst.getHours(); let m = kst.getMinutes();
    h = h < 10 ? '0' + h : h; m = m < 10 ? '0' + m : m;
    document.querySelector('.status-time').innerText = `${h}:${m}`;
}
setInterval(updateClock, 1000); updateClock();

// SPA 라우팅 및 리스트 로드
function handleRoute() {
    const hash = window.location.hash.replace('#', '');
    const listView = document.getElementById('list-view');
    const viewerView = document.getElementById('viewer-view');
    const contentArea = document.getElementById('dynamic-content');

    if (!hash || hash === 'list') {
        // 리스트 뷰로 이동
        listView.style.transform = 'translateX(0)';
        viewerView.style.transform = 'translateX(100%)';
        listView.style.pointerEvents = 'auto';
        document.activeElement.blur(); // 키보드 숨김 방어

        // list.html 이 아직 로드되지 않았다면 Fetch
        if(listView.innerHTML.trim() === '') {
            fetch('list.html').then(r => r.text()).then(html => {
                listView.innerHTML = html;
                initListLogic(); // 필터링 로직 초기화
            });
        }
    } else {
        // 뷰어(대화창) 뷰로 이동
        listView.style.transform = 'translateX(-30%)';
        viewerView.style.transform = 'translateX(0)';
        listView.style.pointerEvents = 'none'; 
        contentArea.innerHTML = '<div style="text-align:center; padding: 50px;"><i class="ri-loader-4-line ri-spin" style="font-size:24px; color:#8e8e93;"></i></div>';

        // 260628.html 등 파일 불러오기 (유저 코드 원본 100% 보존 구역)
        fetch(`dialog/${hash}.html`).then(r => {
            if(!r.ok) throw new Error('메시지가 없습니다.'); return r.text();
        }).then(html => {
            contentArea.innerHTML = html;
            // 유저 코드의 스크립트 실행 보장
            Array.from(contentArea.querySelectorAll('script')).forEach(oldScript => {
                const newScript = document.createElement('script');
                Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                oldScript.parentNode.replaceChild(newScript, oldScript);
            });
        }).catch(e => { contentArea.innerHTML = `<div style="padding: 20px; color: red;">${e.message}</div>`; });
    }
}

// 홈 화면으로 나갈 때 축소되는 애니메이션 연출
window.exitApp = function() {
    const inner = document.querySelector('.app-inner');
    inner.style.transition = 'all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
    inner.style.transform = 'scale(0.8)';
    inner.style.opacity = '0';
    setTimeout(() => { location.href = '../index.html'; }, 250);
}

// 검색 및 태그 필터링 자바스크립트 로직
function initListLogic() {
    const searchInput = document.getElementById('msg-search');
    const tags = document.querySelectorAll('.tag');
    const items = document.querySelectorAll('.chat-item');

    function filterItems() {
        const keyword = searchInput.value.toLowerCase();
        const activeTag = document.querySelector('.tag.active').dataset.tag;

        items.forEach(item => {
            const name = item.querySelector('.chat-name').innerText.toLowerCase();
            const itemTags = item.dataset.tags || '';
            const matchesSearch = name.includes(keyword);
            const matchesTag = (activeTag === '전체') || itemTags.includes(activeTag);

            if(matchesSearch && matchesTag) { item.style.display = 'flex'; }
            else { item.style.display = 'none'; }
        });
    }

    searchInput.addEventListener('input', filterItems);
    
    tags.forEach(tag => {
        tag.addEventListener('click', (e) => {
            tags.forEach(t => t.classList.remove('active'));
            e.target.classList.add('active');
            filterItems();
        });
    });
}

window.addEventListener('hashchange', handleRoute);
window.addEventListener('DOMContentLoaded', handleRoute);
</script>
</body>
</html>
