<!DOCTYPE html>
<html lang="ko">

<head>
    <title>MOB-SKIN 독립형 웹사이트</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1, minimum-scale=1.0, maximum-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge, chrome=1" />
    
    <!----- CSS 및 폰트 라이브러리 (아이콘 깨짐 현상 해결을 위해 안정적인 CDN으로 교체) ----->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.3.1/jquery.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300&display=swap');
        @import url('//fonts.googleapis.com/earlyaccess/jejumyeongjo.css');
        
        /* 1. 오리지널 스킨 테마 변수 (index.xml의 기본값 완벽 매칭) */
        .theme-light {
            --toggle-onoff: "\f204";
            --back-color: #fff;
            --main-color: #353535;
            --title-color: #1d1d1d;
            --sub-color: #c1c1c1;
            --link-color: #c1c1c1;
            --link-color-hover: #a2a2a2;
            --menu-color: #c1c1c1;
            --menu-color-hover: #a2a2a2;
            
            --desc-bg: #f7f7f7;
            --desc-txt: #353535;
            --em-bg: #4b4b4b;
            --em-txt: white;
            --general1-bg: white;
            --general1-txt: #353535;
            --general2-bg: white;
            --general2-txt: #353535;
            --divider-bg: #0000000d;
        }

        .theme-dark {
            --toggle-onoff: "\f205";
            --back-color: #292929;
            --main-color: #dadada;
            --title-color: #fbfbfb;
            --sub-color: #747474;
            --link-color: #747474;
            --link-color-hover: #a5a5a5;
            --menu-color: #747474;
            --menu-color-hover: #a5a5a5;
            
            --desc-bg: #202020;
            --desc-txt: #dadada;
            --em-bg: black;
            --em-txt: #fbfbfb;
            --general1-bg: #292929;
            --general1-txt: #dadada;
            --general2-bg: #292929;
            --general2-txt: #a5a5a5;
            --divider-bg: #ffffff0d;
        }

        /* 2. 오리지널 style.css 스타일 명세 */
        * {
            font-family: 'Jeju Myeongjo', serif;
        }
        :root {
            --title-font: "Jeju Myeongjo", "Noto Serif SC";
            --body-font: "Jeju Myeongjo", "ChosunSm";
        }
        ::selection {
            color: var(--back-color);
            background-color: var(--main-color);
        }
        body {
            background-color: var(--back-color);
        }
        body, button, dd, dl, dt, fieldset, form, h1, h2, h3, h4, h5, h6, input, legend, li, ol, p, select, table, td, textarea, th, ul {
            margin: 0;
            padding: 0;
        }
        body, button, input, select, table, textarea {
            font-family: var(--body-font);
            line-height: 180%;
            font-size: 12px;
            color: var(--main-color);
        }
        button, input {
            border: 0;
            border-radius: 0;
        }
        ol, ul {
            list-style: none;
        }
        a {
            color: var(--link-color);
            font-weight: normal;
            text-decoration: none;
        }
        a:hover {
            text-decoration: none;
            color: var(--link-color-hover);
        }
        html, body, #wrap {
            position: relative;
            height: 100%;
        }
        #container {
            position: absolute;
            width: 100%;
            top: 0;
            z-index: 1;
            left: 0;
        }
        #header {
            position: sticky;
            top: 0;
            z-index: 999;
        }
        .inner_header, .inner_header > button {
            color: var(--menu-color);
        }
        .inner_header :hover, .inner_header > button:hover {
            color: var(--menu-color-hover);
        }
        .inner_header {
            max-width: fit-content;
            padding: 10px 20px 10px 0px;
            text-align: right;
            height: 30px;
            right: 0px;
            position: absolute;
        }
        .inner_header > button {
            background-color: transparent;
            float: right;
            position: absolute;
            right: 40px;
            cursor: pointer;
        }
        .inner_header .fa-solid {
            font-size: 10px;
            margin: 0px 1px;
        }
        
        /* 아이콘 렌더링 강제 적용 (아이콘 깨짐 방지) */
        .fa-solid.fa-bolt:before {
            content: var(--toggle-onoff) !important;
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
        }
        
        .dropdown {
            display: inline-block;
        }
        .dropdown-bars {
            cursor: pointer;
        }
        .dropdown-inner {
            text-shadow: var(--back-color) 1px -1px 0px, var(--back-color) 1px 1px 0px, var(--back-color) -1px -1px 0px, var(--back-color) -1px 0px 0px, var(--back-color) 0px -1px 0px, var(--back-color) 0px 1px 0px, var(--back-color) 1px 0px 0px, var(--back-color) -1px 1px 0px;
        }
        a.link_home, a.link_manage, a.link_post, a.link_login, .dropdown-inner a {
            display: block;
            color: var(--menu-color);
            cursor: pointer;
            padding: 2px 0;
        }
        a.link_home:hover, a.link_manage:hover, a.link_post:hover, a.link_login:hover, .dropdown-inner a:hover {
            color: var(--menu-color-hover);
        }
        .inner_index {
            position: relative;
            max-width: 725px;
            margin: 80px auto;
            overflow: hidden;
        }
        .blog-info {
            margin: 0px 20px 50px 10px;
        }
        @media only screen and (max-width: 700px) {
            .blog-info {
                margin: 0px 20px 50px 10px;
            }
        }
        .blog-info:hover {
            letter-spacing: 1px;
        }
        .blog-name {
            font-family: var(--title-font);
            font-size: 15px;
            color: var(--title-color);
            line-height: 120%;
        }
        .blog-name::before {
            content: "/ ";
        }
        .blog-name::after {
            content: "  ";
        }
        .blog-desc {
            line-height: 100%;
            font-size: 12px;
            color: var(--sub-color);
        }
        .blog-desc::before {
            content: " - ";
        }
        
        /* 정확한 한 줄 형태의 원본 리스트 스타일 명세 */
        .box_contents {
            clear: both;
            padding: 0px 10px;
            margin: 20px 0px;
            width: fit-content;
        }
        .box_contents .link_title .title_post,
        .article_content .box_contents .title_view {
            font-family: var(--title-font);
            font-size: 12px;
            color: var(--title-color);
            line-height: 120%;
        }
        .box_contents .link_title .title_post::before {
            content: "/ ";
        }
        .article_content .box_contents .title_view::before {
            content: "/  ";
        }
        .box_contents .info_post {
            line-height: 100%;
            font-size: 9px;
            color: var(--sub-color);
        }
        .area_view_content {
            padding: 0 20px;
            max-height: auto !important;
        }
        .area_view_content .article_content .info_post {
            display: block !important;
            margin: 10px 0px 80px 0px;
            padding-top: 0;
        }
        @media only screen and (max-width: 700px) {
            .area_view_content .article_content .info_post {
                display: block !important;
                margin: 10px 0px 50px 0px;
                padding-top: 0;
            }
        }
        .area_view_content .article_content .link_title .title_view {
            color: var(--title-color);
            margin-bottom: 10px;
        }
        .area_view_content .article_content .link_title {
            font-family: var(--title-font);
            letter-spacing: 3px;
            font-size: 18px;
        }
        .area_view_content .article_content .view_info_post {
            color: var(--sub-color);
            line-height: 120%;
            font-size: 10px;
            text-align: right;
        }
        .area_view_content .article_view {
            overflow-x: hidden;
        }
        .article_view p {
            margin: 0 0 20px;
            color: var(--main-color);
        }
        
        /* 분리선 오리지널 스타일 정의 */
        .custom-hr {
            margin: 40px auto;
            background: none;
            width: 33px;
            border: none;
            height: 0;
        }
        .custom-hr:before {
            color: var(--sub-color);
            content: "✧ ✧ ✧";
            font-size: 9px;
            letter-spacing: 1px;
            position: absolute;
            margin-top: 10px;
        }

        /* 카테고리 탭 스타일 */
        .category-menu {
            margin: 0px 10px 30px 10px;
            font-size: 11px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }
        .category-item {
            color: var(--sub-color);
            cursor: pointer;
            transition: color 0.2s;
        }
        .category-item:hover, .category-item.active {
            color: var(--title-color);
            font-weight: bold;
        }
        .category-item::before {
            content: "# ";
        }

        /* 화면 뷰 제어용 기본 클래스 */
        .page-view {
            display: none;
        }
        
        /* TRPG 오리지널 서식 매칭 */
        .message { font-family: var(--body-font) !important; line-height: 120%; font-size: 11px !important; padding: 5px; margin: 2px 0; }
        .message.general { background-color: var(--general1-bg) !important; color: var(--general1-txt) !important; }
        .message.emote { background-color: var(--em-bg) !important; color: var(--em-txt) !important; }
        .message.desc { background-color: var(--desc-bg) !important; color: var(--desc-txt) !important; }
    </style>
</head>

<body>
    <div id="wrap">
        <div id="container">
            
            <!----- 헤더 영역 ----->
            <header id="header">
                <div class="inner_header">
                    <button onclick="toggleTheme()">
                        <i class="fa-solid fa-bolt"></i>
                    </button>
                    <div class="dropdown">
                        <div class="dropdown-bars">
                            <i class="fa-solid fa-bars"></i>
                        </div>
                        <!-- 요청사항 반영: HOME, 공지, 목록 고정 구성 -->
                        <div class="dropdown-inner">
                            <a href="#" onclick="changeView('home'); return false;">
                                HOME <i class="fa-solid fa-landmark"></i>
                            </a>
                            <a href="#" onclick="changeView('notice'); return false;">
                                공지 <i class="fa-solid fa-bullhorn"></i>
                            </a>
                            <a href="#" onclick="changeView('list'); return false;">
                                목록 <i class="fa-solid fa-list"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </header>

            <!---- 메인 홈 콘텐츠 ---->
            <main id="main">
                <div class="inner_index">

                    <!-- [1] HOME 화면 (나중에 자유롭게 꾸밀 빈 공간) -->
                    <div id="view-home" class="page-view">
                        <div class="blog-info">
                            <span class="blog-name">MOB-SKIN</span>
                            <span class="blog-desc">텍스트 위주의 최소한의 디자인 정적 페이지</span>
                        </div>
                        <div style="text-align: center; padding: 100px 0; color: var(--sub-color); font-size: 11px;">
                            [HOME 화면 영역 - 나중에 이곳을 코드로 자유롭게 꾸미시면 됩니다.]
                        </div>
                    </div>

                    <!-- [2] 공지사항 화면 (본문 설정 스타일처럼 1개의 글로 노출) -->
                    <div id="view-notice" class="page-view">
                        <div class="area_view_content">
                            <div class="article_content">
                                <div class="info_post">
                                    <div class="title_view" id="notice-title"></div>
                                    <div class="view_info_post" id="notice-date"></div>
                                </div>
                                <div class="article_view" id="notice-content"></div>
                            </div>
                        </div>
                    </div>

                    <!-- [3] 목록 리스트 화면 (원본 한 줄 텍스트 리스트 형태 완전 유지) -->
                    <div id="view-list" class="page-view">
                        <!-- 사용자가 유동적으로 바꿀 수 있는 카테고리 탭 렌더링 공간 -->
                        <div class="category-menu" id="category-menu-container"></div>
                        
                        <!-- 리스트 동적 추가 컨테이너 -->
                        <div id="list-container"></div>
                    </div>

                    <!-- [4] 목록에서 클릭 시 보여질 단독 본문 보기 화면 -->
                    <div id="view-article" class="page-view">
                        <div class="area_view_content">
                            <div class="article_content">
                                <div class="info_post">
                                    <a href="#" onclick="changeView('list'); return false;" class="link_title">
                                        <div class="title_view" id="article-title"></div>
                                    </a>
                                    <div class="view_info_post" id="article-date"></div>
                                </div>
                                <div class="article_view" id="article-content"></div>
                                
                                <!-- 본문 하단 목록으로 가기 장치 추가 -->
                                <div style="text-align: right; margin-top: 50px;">
                                    <a href="#" onclick="changeView('list'); return false;" style="font-size: 11px; color: var(--sub-color);">[목록으로 돌아가기]</a>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            </main>
        </div>
    </div>

    <!-- ========================================================
       ★ [핵심 컨트롤 스크립트] : 이 배열 데이터만 편집하면 연동됩니다.
       ======================================================== -->
    <script>
        // 1. 카테고리 종류 설정 (자유롭게 추가/삭제 가능, 목록 화면 상단 탭에 연동됨)
        const CONFIG_CATEGORIES = ["일상", "개발", "TRPG", "비밀글"];

        // 2. 공지사항 단독 글 데이터 설정
        const CONFIG_NOTICE = {
            title: "MOB-SKIN 단독 웹사이트 이전 공지",
            date: "2026. 06. 14",
            content: `
                <p>기존 티스토리 스킨 레이아웃을 기반으로 한 단독 정적 웹사이트 빌드가 완료되었습니다.</p>
                <p>우측 상단의 네비게이션바를 통해 HOME, 공지사항, 목록형 리스트 사이를 매끄럽게 오갈 수 있습니다.</p>
            `
        };

        // 3. 게시글 추가 목록 데이터 (원하는 만큼 객체 블록을 복사해서 쉽게 추가하세요)
        const CONFIG_ARTICLES = [
            {
                category: "일상",
                title: "첫 번째 미니멀 텍스트 기록",
                date: "2026. 06. 14",
                content: "<p>여기는 첫 번째 게시물의 본문 상세 내용입니다. 가독성을 고려한 본연의 폰트 및 행간 배치가 고스란히 투영됩니다.</p>"
            },
            {
                category: "개발",
                title: "HTML 데이터 바인딩 방식으로 변환하기",
                date: "2026. 06. 13",
                content: "<p>자바스크립트 배열 구조를 활용하여 백엔드 DB 연동 없이 정적 페이지 환경에서도 무결하게 글 목록을 로드할 수 있도록 변환 처리를 완수했습니다.</p>"
            },
            {
                category: "TRPG",
                title: "세션 로그 인라인 커스텀 폼 확인",
                date: "2026. 06. 12",
                content: `
                    <p>TRPG 전용 클래스 양식이 완벽하게 호환 작동합니다.</p>
                    <div class="message general"><span class="by">탐사자 A:</span> 문을 열어보겠습니다.</div>
                    <div class="message emote">끼이익 소리와 함께 무거운 철문이 열립니다.</div>
                    <div class="message desc">관찰력 판정이 요구되는 구간입니다.</div>
                `
            },
            {
                category: "비밀글",
                title: "보호 글 형태의 임시 레이아웃 확인",
                date: "2026. 06. 11",
                content: "<p>카테고리 분리 가변 세팅에 맞추어 각 항목을 클릭 시 동적으로 매칭 정렬되는 오리지널 리스트 폼입니다.</p>"
            }
        ];
    </script>

    <!----- 오리지널 로직 보존 및 변환 제어 자바스크립트 ----->
    <script>
        // 드롭다운 애니메이션 기본 보존 및 링크 클릭 시 자동 닫힘 확장
        $(document).ready(function () {
            $(".dropdown-inner").hide();
            $(".dropdown-bars").click(function (e) {
                e.stopPropagation();
                $(this).next(".dropdown-inner").slideToggle(500);
                $("i", this).toggleClass("fa-chevron-down fa-chevron-up");
            });
            
            // 페이지 이동 액션 발생 시 드롭다운 닫기 인터랙션 보완
            $(".dropdown-inner a").click(function() {
                $(".dropdown-inner").slideUp(300);
            });
        });

        // 테마 관리 로직 (완벽 보존)
        function setTheme(themeName) {
            localStorage.setItem('theme', themeName);
            document.documentElement.className = themeName;
        }
        function toggleTheme() {
            if (localStorage.getItem('theme') === 'theme-dark') {
                setTheme('theme-light');
            } else {
                setTheme('theme-dark');
            }
        }
        (function () {
            if (localStorage.getItem('theme') === 'theme-dark') {
                setTheme('theme-dark');
            } else {
                setTheme('theme-light');
            }
        })();

        // [동적 제어 엔진] : 화면 뷰 전환
        function changeView(viewName) {
            $('.page-view').hide();
            $(`#view-${viewName}`).show();
            window.scrollTo(0, 0);

            // 공지사항 로드 핸들러
            if(viewName === 'notice') {
                $('#notice-title').text(CONFIG_NOTICE.title);
                $('#notice-date').text("공지 · " + CONFIG_NOTICE.date);
                $('#notice-content').html(CONFIG_NOTICE.content);
                wrapTables('#notice-content');
            }
        }

        // [동적 제어 엔진] : 카테고리 탭 생성 및 리스트 빌더
        function initializeWebsite() {
            const menuContainer = $('#category-menu-container');
            menuContainer.empty();

            // 기본 전체 탭 구성
            menuContainer.append(`<span class="category-item active" onclick="filterCategory('전체', this)">전체</span>`);
            
            // 커스텀 가변 카테고리 추가
            CONFIG_CATEGORIES.forEach(cat => {
                menuContainer.append(`<span class="category-item" onclick="filterCategory('${cat}', this)">${cat}</span>`);
            });

            // 초기 전체 리스트 출력
            buildList('전체');
        }

        function buildList(targetCategory) {
            const listContainer = $('#list-container');
            listContainer.empty();

            CONFIG_ARTICLES.forEach((item, index) => {
                if (targetCategory === '전체' || item.category === targetCategory) {
                    // 원작 skin.html의 <s_index_article_rep> 돔 트리를 100% 반영한 태그 조립
                    const html = `
                        <div class="article_content">
                            <div class="box_contents">
                                <a href="#" class="link_title" onclick="openArticle(${index}); return false;">
                                    <div class="title_post">${item.title}</div>
                                    <div class="info_post">${item.category} · ${item.date}</div>
                                </a>
                            </div>
                        </div>
                    `;
                    listContainer.append(html);
                }
            });
        }

        function filterCategory(categoryName, element) {
            $('.category-item').removeClass('active');
            $(element).addClass('active');
            buildList(categoryName);
        }

        function openArticle(index) {
            const item = CONFIG_ARTICLES[index];
            $('#article-title').text(item.title);
            $('#article-date').text(item.category + " · " + item.date);
            $('#article-content').html(item.content);
            wrapTables('#article-content');
            changeView('article');
        }

        // 테이블 오버플로우 자동 처리 원본 스크립트 대응 함수
        function wrapTables(targetContainer) {
            $(targetContainer).find("table").each(function (idx, el) {
                if (!$(el).parent().hasClass('table-overflow')) {
                    $(el).wrap('<div class="table-overflow">');
                }
            });
        }

        // 도큐먼트 로드 즉시 실행구문
        $(document).ready(function() {
            initializeWebsite();
            changeView('home'); // 시작 기본값: HOME 노출
        });
    </script>
</body>

</html>
